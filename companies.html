<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI torch 企業検索</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',-apple-system,BlinkMacSystemFont,sans-serif;background:#FFFFFF;color:#14213D;min-height:100vh}
#lock-screen{position:fixed;inset:0;background:#14213D;display:flex;align-items:center;justify-content:center;z-index:9999}
#lock-box{background:#FFFFFF;border-radius:4px;padding:36px 40px;width:320px;text-align:center}
#lock-box h2{font-size:16px;font-weight:500;margin-bottom:6px}
#lock-box p{font-size:13px;color:#6B7A99;margin-bottom:20px}
#lock-box input{width:100%;height:40px;padding:0 14px;border:1px solid #DEE7F7;border-radius:4px;font-size:15px;margin-bottom:10px;background:#fff}
#lock-box input:focus{outline:none;border-color:#0D40D9}
#lock-box button{width:100%;height:40px;background:#14213D;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer}
#lock-error{color:#0D40D9;font-size:12px;margin-top:8px;min-height:18px}
#app{display:none}
.main{max-width:900px;margin:0 auto;padding:16px}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;height:40px;padding:0 14px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;font-size:14px}
.search-bar input:focus{outline:none;border-color:#0D40D9}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.filters select{height:34px;padding:0 10px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;font-size:13px}
.score-filter{display:flex;align-items:center;gap:6px;font-size:13px;color:#6B7A99}
.score-filter select{height:30px;font-size:12px;padding:0 6px}
.tag-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.tag{padding:5px 12px;border:1px solid #DEE7F7;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#555;white-space:nowrap;transition:all 0.15s;user-select:none}
.tag.on{background:#14213D;color:#fff;border-color:#14213D}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.count{font-size:13px;color:#6B7A99}
.sort-wrap{display:flex;align-items:center;gap:6px;font-size:13px;color:#666}
.sort-wrap select{height:30px;font-size:12px;padding:0 8px;border:1px solid #DEE7F7;border-radius:6px;background:#fff}
.filters-advanced{display:none;flex-wrap:wrap;gap:16px;margin-bottom:12px;padding:14px 16px;background:#fff;border:1px solid #DEE7F7;border-radius:8px}
.filters-advanced.show{display:flex}
.filter-btn{height:34px;padding:0 12px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#14213D}
.tech-and-input{height:34px;padding:0 10px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;font-size:13px;width:200px}
.list{display:flex;flex-direction:column;gap:6px}
.card{background:#fff;border:1px solid #DEE7F7;border-radius:10px;padding:12px 16px;transition:border-color 0.15s}
.card:hover{border-color:#0D40D9}
.card-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer}
.name{font-size:14px;font-weight:500;flex:1}
.tier-badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.t1{background:#eeedfe;color:#3c3489}
.t2{background:#e1f5ee;color:#085041}
.t3{background:#f1efe8;color:#444441}
.tn{background:#f1f1f1;color:#888}
.stopped-badge{padding:2px 8px;border-radius:10px;font-size:11px;background:#feecec;color:#991a1a}
.notion-btn{padding:2px 10px;border-radius:8px;font-size:11px;background:#f3f0e8;color:#3d3929;text-decoration:none;border:1px solid #e0dbc8;white-space:nowrap}
.notion-btn:hover{background:#e8e3d0}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:8px;cursor:pointer}
.industry{font-size:12px;color:#888}
.pill{padding:2px 8px;border-radius:8px;font-size:11px;background:#f5f5f0;color:#666}
.scores{display:flex;gap:14px;flex-wrap:wrap;cursor:pointer}
.score-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.score-label{font-size:10px;color:#aaa}
.score-bar-wrap{width:32px;height:4px;background:#eee;border-radius:2px;overflow:hidden}
.score-bar{height:4px;border-radius:2px;background:#4a7c59}
.score-num{font-size:11px;color:#666}
.detail{display:none;margin-top:10px;border-top:1px solid #f0f0f0;padding-top:10px}
.card.open .detail{display:block}
.bool-pill{display:inline-block;padding:3px 9px;border-radius:10px;font-size:11px;background:#f0f7f2;color:#2d6a4f;margin:2px}
.roles-text{font-size:12px;color:#666;margin-top:6px}
.tech-text{font-size:12px;color:#999;margin-top:3px}
.area-text{font-size:12px;color:#666;margin-top:3px}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.error{text-align:center;padding:40px;color:#c00;font-size:14px}
</style>
<link rel="stylesheet" href="assets/shared.css">
</head>
<body>
<div id="lock-screen">
  <div id="lock-box">
    <h2>AI torch 企業検索</h2>
    <p>メールアドレスとパスワードでログイン</p>
    <input type="email" id="email-input" placeholder="メールアドレス">
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">ログイン</button>
    <div id="lock-error"></div>
  </div>
</div>

<div id="app">
  <nav class="app-sidebar">
    <a class="sb-logo" href="index.html"><img src="assets/torch-blue-circle.jpg" alt="AI torch"></a>
    <a class="sb-item" href="index.html"><span class="sb-icon">⌂</span><span class="sb-label">Home</span></a>
    <a class="sb-item active" href="companies.html"><span class="sb-icon">◧</span><span class="sb-label">企業検索</span></a>
    <a class="sb-item" href="candidates.html"><span class="sb-icon">☰</span><span class="sb-label">候補者管理</span></a>
    <a class="sb-item" href="pipeline.html"><span class="sb-icon">◎</span><span class="sb-label">パイプライン</span></a>
    <a class="sb-item" href="https://k-aikawa-ai-torch.github.io/ai-torch-dashboard/dashboard.html"><span class="sb-icon">▤</span><span class="sb-label">ダッシュボード</span></a>
    <div class="sb-spacer"></div>
    <div class="sb-item" onclick="logout()"><span class="sb-icon">⏻</span><span class="sb-label">ログアウト</span></div>
  </nav>
  <div class="app-body">
    <div class="top-strip">
      <h1 class="brand-serif">AI torch 企業検索</h1>
      <span class="badge" id="header-count">読み込み中…</span>
    </div>
  <div class="main">
    <div class="search-bar">
      <input type="text" id="q" placeholder="企業名・技術キーワード・職種で検索…" oninput="render()">
    </div>
    <div class="filters">
      <select id="industry" onchange="render()"></select>
      <select id="role" onchange="render()"></select>
      <select id="area_filter" onchange="render()"></select>
      <select id="member_filter" onchange="render()"></select>
      <div class="score-filter">
        <span>内定率≥</span>
        <input type="number" id="min_naitei" onchange="render()" placeholder="%" min="0" max="100" style="width:56px;height:30px;padding:0 6px;border:1px solid #DEE7F7;border-radius:6px;font-size:12px">%
        <span>承諾率≥</span>
        <input type="number" id="min_offer" onchange="render()" placeholder="-" style="width:56px;height:30px;padding:0 6px;border:1px solid #DEE7F7;border-radius:6px;font-size:12px">
        <span>年収≥</span>
        <select id="min_salary" onchange="render()">
          <option value="0">-</option>
          <option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        </select>
        <span>技術力≥</span>
        <select id="min_tech" onchange="render()">
          <option value="0">-</option>
          <option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        </select>
        <span>社会貢献≥</span>
        <select id="min_social" onchange="render()">
          <option value="0">-</option>
          <option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        </select>
      </div>
    </div>
    <div class="tag-filters" id="tech-tag-filters" style="margin-bottom:6px">
      <span style="font-size:12px;color:#6B7A99;margin-right:2px">技術:</span>
    </div>
    <div class="tag-filters">
      <span class="tag" data-key="remote" onclick="toggleTag(this)">フルリモ</span>
      <span class="tag" data-key="global" onclick="toggleTag(this)">グローバル</span>
      <span class="tag" data-key="megaben" onclick="toggleTag(this)">メガベン</span>
      <button class="filter-btn" type="button" id="adv-filter-toggle" onclick="toggleAdvFilters()">詳細フィルタ ▾</button>
      <button class="filter-btn" type="button" onclick="clearAllFilters()">全クリア</button>
      <select id="preset-select" onchange="applyPreset()" class="filter-btn" style="padding:0 8px"><option value="">検索条件を選択…</option></select>
      <button class="filter-btn" type="button" onclick="saveSearchPreset()">💾 保存</button>
      <button class="filter-btn" type="button" onclick="deleteSearchPreset()" style="color:#b3261e">🗑️</button>
    </div>
    <div class="filters-advanced" id="filters-advanced">
      <select id="tier" onchange="render()">
        <option value="">全Tier</option>
        <option value="1">Tier 1</option>
        <option value="2">Tier 2</option>
        <option value="3">Tier 3</option>
      </select>
      <div class="score-filter">
        <span>WLB≥</span>
        <select id="min_wlb" onchange="render()">
          <option value="0">-</option>
          <option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        </select>
        <span>ネームバリュー≥</span>
        <select id="min_brand" onchange="render()">
          <option value="0">-</option>
          <option value="5">5</option><option value="6">6</option>
          <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        </select>
      </div>
      <span class="tag" data-key="ai" onclick="toggleTag(this)">AI</span>
      <span class="tag" data-key="feeup" onclick="toggleTag(this)">FeeUP</span>
      <span class="tag" data-key="senior" onclick="toggleTag(this)">50代可</span>
      <span class="tag" data-key="stopped" onclick="toggleTag(this)">採用停止含む</span>
    </div>
    <div class="top-bar">
      <span class="count" id="count"></span>
      <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:#666;flex-wrap:wrap">
        <label>第1ソート:</label>
        <select id="sort1" onchange="render()" style="height:30px;font-size:12px;padding:0 8px;border:1px solid #DEE7F7;border-radius:6px;background:#fff">
          <option value="naitei">内定率スコア</option><option value="offer">承諾率スコア</option>
          <option value="salary">年収</option>
          <option value="wlb">WLB</option>
          <option value="tech">技術力</option>
          <option value="autonomy">裁量</option>
          <option value="social">社会貢献</option>
          <option value="brand">ネームバリュー</option>
          <option value="tier">Tier</option>
          <option value="name">企業名</option>
        </select>
        <button id="sort1-dir-btn" onclick="toggleSortDir(1)" title="第1ソートの並び順を反転" style="height:30px;padding:0 10px;border:1px solid #DEE7F7;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#14213D">▼</button>
        <label>第2ソート:</label>
        <select id="sort2" onchange="render()" style="height:30px;font-size:12px;padding:0 8px;border:1px solid #DEE7F7;border-radius:6px;background:#fff">
          <option value="name">企業名</option>
          <option value="naitei">内定率スコア</option><option value="offer">承諾率スコア</option>
          <option value="salary">年収</option>
          <option value="wlb">WLB</option>
          <option value="tech">技術力</option>
          <option value="autonomy">裁量</option>
          <option value="social">社会貢献</option>
          <option value="brand">ネームバリュー</option>
          <option value="tier">Tier</option>
        </select>
        <button id="sort2-dir-btn" onclick="toggleSortDir(2)" title="第2ソートの並び順を反転" style="height:30px;padding:0 10px;border:1px solid #DEE7F7;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#14213D">▼</button>
      </div>
    </div>
    <div id="list"><div class="loading">データを読み込み中…</div></div>
  </div>
  </div>
</div>

<script>
// ★ここにSupabaseの情報を入力
const SUPABASE_URL = 'https://vqunibhzmvlckqbydgea.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdW5pYmh6bXZsY2txYnlkZ2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzY0NTYsImV4cCI6MjA5NzgxMjQ1Nn0.t9_RIVPY1vrgGmxxFFYXP9uWxT7401ha4Flc9q0_zMA';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let DATA = [];
let ALL_MEMBERS = [];
let activeTags = new Set();
let activeTechTags = new Set();
let sort1Dir = -1;
let sort2Dir = -1;

async function login() {
  const email = document.getElementById('email-input').value;
  const password = document.getElementById('pw-input').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('lock-error').textContent = 'メールアドレスまたはパスワードが違います';
    return;
  }
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.title = 'AI torch 企業検索';
  loadData();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

// セッション維持
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.title = 'AI torch 企業検索';
    loadData();
  }
});

async function loadData() {
  const [companiesRes, membersRes] = await Promise.all([
    sb.from('companies').select('*, members(display_name,name)').order('acceptance_rate', { ascending: false }),
    sb.from('members').select('*'),
  ]);
  if (companiesRes.error) {
    document.getElementById('list').innerHTML = '<div class="error">データの読み込みに失敗しました。</div>';
    return;
  }
  DATA = companiesRes.data;
  ALL_MEMBERS = membersRes.data || [];
  document.getElementById('header-count').textContent = DATA.length + '社';
  initSelects();
  await loadPresets();
  render();
}

function initSelects() {
  const allIndustries = [...new Set(DATA.flatMap(c => (c.industry||'').split(/,\s*/)))].filter(Boolean).sort();
  const allRoles = [...new Set(DATA.flatMap(c => (c.roles||'').split(/,\s*/)))].filter(Boolean).sort();
  const allAreas = [...new Set(DATA.flatMap(c => (c.area||'').split(/,\s*/)))].filter(Boolean).sort();
  const allTech = [...new Set(DATA.flatMap(c => (c.tech||'').split(/,\s*/)))].filter(Boolean).sort();
  const indSel = document.getElementById('industry');
  const roleSel = document.getElementById('role');
  const areaSel = document.getElementById('area_filter');
  const memberSel = document.getElementById('member_filter');
  indSel.innerHTML = '<option value="">全業界</option>';
  roleSel.innerHTML = '<option value="">全職種</option>';
  areaSel.innerHTML = '<option value="">全エリア</option>';
  memberSel.innerHTML = '<option value="">全担当者</option>';
  allIndustries.forEach(i => { const o = document.createElement('option'); o.value=i; o.textContent=i; indSel.appendChild(o); });
  allRoles.forEach(r => { const o = document.createElement('option'); o.value=r; o.textContent=r; roleSel.appendChild(o); });
  allAreas.forEach(a => { const o = document.createElement('option'); o.value=a; o.textContent=a; areaSel.appendChild(o); });
  ALL_MEMBERS.forEach(m => { const o = document.createElement('option'); o.value=m.id; o.textContent=m.display_name||m.name; memberSel.appendChild(o); });

  const techWrap = document.getElementById('tech-tag-filters');
  techWrap.innerHTML = '<span style="font-size:12px;color:#6B7A99;margin-right:2px">技術:</span>' +
    allTech.map(t => '<span class="tag" data-tech="' + t + '" onclick="toggleTechTag(this)">' + t + '</span>').join('');
}

function toggleTechTag(el) {
  const t = el.dataset.tech;
  activeTechTags.has(t) ? activeTechTags.delete(t) : activeTechTags.add(t);
  el.classList.toggle('on');
  render();
}

function toggleSortDir(which) {
  if (which === 1) {
    sort1Dir *= -1;
    document.getElementById('sort1-dir-btn').textContent = sort1Dir === 1 ? '▲' : '▼';
  } else {
    sort2Dir *= -1;
    document.getElementById('sort2-dir-btn').textContent = sort2Dir === 1 ? '▲' : '▼';
  }
  render();
}

function toggleAdvFilters() {
  document.getElementById('filters-advanced').classList.toggle('show');
}

function clearAllFilters() {
  document.getElementById('q').value = '';
  document.getElementById('tier').value = '';
  document.getElementById('industry').value = '';
  document.getElementById('role').value = '';
  document.getElementById('area_filter').value = '';
  document.getElementById('member_filter').value = '';
  document.getElementById('min_naitei').value = '';
  document.getElementById('min_offer').value = '';
  ['min_salary','min_wlb','min_tech','min_social','min_brand'].forEach(id => document.getElementById(id).value = '0');
  activeTags.clear();
  activeTechTags.clear();
  document.querySelectorAll('.tag.on').forEach(el => el.classList.remove('on'));
  document.getElementById('preset-select').value = '';
  render();
}

function getCurrentFilterState() {
  return {
    q: document.getElementById('q').value,
    tier: document.getElementById('tier').value,
    industry: document.getElementById('industry').value,
    role: document.getElementById('role').value,
    activeTechTags: Array.from(activeTechTags),
    area_filter: document.getElementById('area_filter').value,
    member_filter: document.getElementById('member_filter').value,
    min_naitei: document.getElementById('min_naitei').value,
    min_offer: document.getElementById('min_offer').value,
    min_salary: document.getElementById('min_salary').value,
    min_wlb: document.getElementById('min_wlb').value,
    min_tech: document.getElementById('min_tech').value,
    min_social: document.getElementById('min_social').value,
    min_brand: document.getElementById('min_brand').value,
    activeTags: Array.from(activeTags),
    sort1: document.getElementById('sort1').value,
    sort2: document.getElementById('sort2').value,
    sort1Dir: sort1Dir,
    sort2Dir: sort2Dir,
  };
}

function applyFilterState(state) {
  document.getElementById('q').value = state.q || '';
  document.getElementById('tier').value = state.tier || '';
  document.getElementById('industry').value = state.industry || '';
  document.getElementById('role').value = state.role || '';
  activeTechTags = new Set(state.activeTechTags || []);
  document.querySelectorAll('#tech-tag-filters .tag').forEach(el => { el.classList.toggle('on', activeTechTags.has(el.dataset.tech)); });
  document.getElementById('area_filter').value = state.area_filter || '';
  document.getElementById('member_filter').value = state.member_filter || '';
  document.getElementById('min_naitei').value = state.min_naitei || '';
  document.getElementById('min_offer').value = state.min_offer || '';
  document.getElementById('min_salary').value = state.min_salary || '0';
  document.getElementById('min_wlb').value = state.min_wlb || '0';
  document.getElementById('min_tech').value = state.min_tech || '0';
  document.getElementById('min_social').value = state.min_social || '0';
  document.getElementById('min_brand').value = state.min_brand || '0';
  activeTags = new Set(state.activeTags || []);
  document.querySelectorAll('.tag-filters .tag').forEach(el => { el.classList.toggle('on', activeTags.has(el.dataset.key)); });
  document.getElementById('sort1').value = state.sort1 || 'offer';
  document.getElementById('sort2').value = state.sort2 || 'name';
  sort1Dir = state.sort1Dir || -1;
  sort2Dir = state.sort2Dir || -1;
  document.getElementById('sort1-dir-btn').textContent = sort1Dir === 1 ? '▲' : '▼';
  document.getElementById('sort2-dir-btn').textContent = sort2Dir === 1 ? '▲' : '▼';
  render();
}

let PRESETS = [];
async function loadPresets() {
  const { data } = await sb.from('company_search_presets').select('*').order('name');
  PRESETS = data || [];
  const sel = document.getElementById('preset-select');
  sel.innerHTML = '<option value="">検索条件を選択…</option>' + PRESETS.map(p => '<option value="' + p.id + '">' + p.name + '</option>').join('');
}

function applyPreset() {
  const id = document.getElementById('preset-select').value;
  if (!id) return;
  const preset = PRESETS.find(p => p.id === id);
  if (preset) applyFilterState(preset.filters);
}

async function saveSearchPreset() {
  const name = prompt('検索条件の名前を入力してください（既存と同じ名前を入力すると上書きされます）:');
  if (!name) return;
  const filters = getCurrentFilterState();
  const existing = PRESETS.find(p => p.name === name);
  if (existing) {
    if (!confirm('「' + name + '」は既に存在します。上書きしますか？')) return;
    const { error } = await sb.from('company_search_presets').update({ filters: filters }).eq('id', existing.id);
    if (error) { alert('上書きに失敗しました: ' + error.message); return; }
  } else {
    const { error } = await sb.from('company_search_presets').insert({ name: name, filters: filters });
    if (error) { alert('保存に失敗しました: ' + error.message); return; }
  }
  alert('保存しました');
  await loadPresets();
}

async function deleteSearchPreset() {
  const id = document.getElementById('preset-select').value;
  if (!id) { alert('削除する検索条件を選択してください'); return; }
  const preset = PRESETS.find(p => p.id === id);
  if (!preset) return;
  if (!confirm('「' + preset.name + '」を削除します。よろしいですか？')) return;
  const { error } = await sb.from('company_search_presets').delete().eq('id', id);
  if (error) { alert('削除に失敗しました: ' + error.message); return; }
  await loadPresets();
}

function toggleTag(el) {
  const k = el.dataset.key;
  activeTags.has(k) ? activeTags.delete(k) : activeTags.add(k);
  el.classList.toggle('on');
  render();
}

function toggleCard(el) { el.closest('.card').classList.toggle('open'); }

function resolveMember(c) {
  if (c.members) return c.members.display_name || c.members.name;
  const aikawa = ALL_MEMBERS.find(m => (m.display_name||m.name||'').includes('相川'));
  return aikawa ? (aikawa.display_name||aikawa.name) : null;
}
function resolveMemberId(c) {
  if (c.member_id) return c.member_id;
  const aikawa = ALL_MEMBERS.find(m => (m.display_name||m.name||'').includes('相川'));
  return aikawa ? aikawa.id : null;
}

function scoreBar(val) {
  if (val === null || val === undefined) return '<span style="font-size:11px;color:#ccc">-</span>';
  const pct = Math.round((val/10)*100);
  return `<div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div><span class="score-num">${val}</span>`;
}

function render() {
  const q = (document.getElementById('q').value||'').toLowerCase();
  const tier = document.getElementById('tier').value;
  const ind = document.getElementById('industry').value;
  const role = document.getElementById('role').value;
  const areaFilter = document.getElementById('area_filter').value;
  const memberFilter = document.getElementById('member_filter').value;
  const minNaitei = +document.getElementById('min_naitei').value || 0;
  const minOffer = +document.getElementById('min_offer').value || 0;
  const minSalary = +document.getElementById('min_salary').value;
  const minWlb = +document.getElementById('min_wlb').value;
  const minTech = +document.getElementById('min_tech').value;
  const minSocial = +document.getElementById('min_social').value;
  const minBrand = +document.getElementById('min_brand').value;
  const showStopped = activeTags.has('stopped');

  let res = DATA.filter(c => {
    if (!showStopped && c.stopped) return false;
    if (tier && String(c.tier) !== tier) return false;
    if (ind && !(c.industry||'').split(/,\s*/).includes(ind)) return false;
    if (role && !(c.roles||'').split(/,\s*/).includes(role)) return false;
    if (activeTechTags.size) {
      const cTechs = (c.tech||'').split(/,\s*/);
      for (const t of activeTechTags) { if (!cTechs.includes(t)) return false; }
    }
    if (areaFilter && !(c.area||'').split(/,\s*/).includes(areaFilter)) return false;
    if (memberFilter && resolveMemberId(c) !== memberFilter) return false;
    if (minNaitei && (c.offer_rate === null || c.offer_rate === undefined || c.offer_rate * 100 < minNaitei)) return false;
    if (minOffer && (c.acceptance_rate === null || c.acceptance_rate === undefined || c.acceptance_rate < minOffer)) return false;
    if (minSalary && (c.score_salary === null || c.score_salary < minSalary)) return false;
    if (minWlb && (c.score_wlb === null || c.score_wlb < minWlb)) return false;
    if (minTech && (c.score_tech === null || c.score_tech < minTech)) return false;
    if (minSocial && (c.score_social === null || c.score_social < minSocial)) return false;
    if (minBrand && (c.score_brand === null || c.score_brand < minBrand)) return false;
    for (const k of activeTags) {
      if (k === 'stopped') continue;
      if (!c[k]) return false;
    }
    if (q && !(c.name||'').toLowerCase().includes(q) && !(c.tech||'').toLowerCase().includes(q) && !(c.roles||'').toLowerCase().includes(q) && !(c.industry||'').toLowerCase().includes(q)) return false;
    return true;
  });

  const sort1 = document.getElementById('sort1').value;
  const sort2 = document.getElementById('sort2').value;

  const SCORE_MAP = {naitei:'offer_rate',offer:'acceptance_rate',salary:'score_salary',wlb:'score_wlb',tech:'score_tech',autonomy:'score_autonomy',social:'score_social',brand:'score_brand'};

  function compareCompBy(key, a, b) {
    if (key === 'name') return (a.name||'').localeCompare(b.name||'','ja');
    if (key === 'tier') return (a.tier||99) - (b.tier||99);
    if (SCORE_MAP[key]) return (a[SCORE_MAP[key]]||0) - (b[SCORE_MAP[key]]||0);
    return 0;
  }

  res.sort((a,b) => {
    const r1 = sort1Dir * compareCompBy(sort1, a, b);
    if (r1 !== 0) return r1;
    return sort2Dir * compareCompBy(sort2, a, b);
  });

  document.getElementById('count').textContent = res.length + '社';
  const list = document.getElementById('list');
  if (res.length === 0) { list.innerHTML = '<div class="loading">該当する企業がありません</div>'; return; }

  list.innerHTML = res.map(c => {
    const tb = c.tier===1?'t1':c.tier===2?'t2':c.tier===3?'t3':'tn';
    const tierLabel = c.tier ? `Tier ${c.tier}` : '未分類';
    const bools = [];
    if(c.remote) bools.push('フルリモ');
    if(c.global) bools.push('グローバル');
    if(c.ai) bools.push('AI');
    if(c.feeup) bools.push('FeeUP');
    if(c.megaben) bools.push('メガベン');
    if(c.senior) bools.push('50代可');
    const notionBtn = c.notion_url ? `<a href="${c.notion_url}" target="_blank" onclick="event.stopPropagation()" class="notion-btn">📝 Notion</a>` : '';
    return `<div class="card">
      <div class="card-top" onclick="toggleCard(this)">
        <span class="name">${c.name}</span>
        <span class="tier-badge ${tb}">${tierLabel}</span>
        ${c.stopped ? '<span class="stopped-badge">採用停止</span>' : ''}
        ${notionBtn}
      </div>
      <div class="card-meta" onclick="toggleCard(this)">
        <span class="industry">${c.industry||''}</span>
        ${c.offer_rate!=null ? `<span class="pill">内定率 ${Math.round(c.offer_rate*100)}%</span>` : ''}
        ${c.acceptance_rate ? `<span class="pill">承諾率 ${c.acceptance_rate}</span>` : ''}
        ${resolveMember(c) ? `<span class="pill" style="color:#6B7A99">👤 ${resolveMember(c)}</span>` : ''}
      </div>
      <div class="scores" onclick="toggleCard(this)">
        ${[['年収',c.score_salary],['WLB',c.score_wlb],['技術力',c.score_tech],['裁量',c.score_autonomy],['社会貢献',c.score_social]].map(([l,v]) =>
          `<div class="score-item"><span class="score-label">${l}</span>${scoreBar(v)}</div>`
        ).join('')}
      </div>
      <div class="detail">
        ${bools.length ? `<div style="margin-bottom:6px">${bools.map(b=>`<span class="bool-pill">${b}</span>`).join('')}</div>` : ''}
        ${c.roles ? `<div class="roles-text">職種: ${c.roles}</div>` : ''}
        ${c.tech ? `<div class="tech-text">技術: ${c.tech}</div>` : ''}
        ${c.area ? `<div class="area-text">エリア: ${c.area}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}
</script>
