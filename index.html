<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI torch 業務システム</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',-apple-system,sans-serif;background:#FFFFFF;color:#14213D;min-height:100vh}

#lock-screen{position:fixed;inset:0;background:#14213D;display:flex;align-items:center;justify-content:center;z-index:9999}
#lock-box{background:#FFFFFF;border-radius:4px;padding:40px 44px;width:320px;text-align:center}
#lock-box h2{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:700;margin-bottom:6px}
#lock-box p{font-size:12.5px;color:#6B7A99;margin-bottom:22px}
#lock-box input{width:100%;height:40px;padding:0 14px;border:1px solid #DEE7F7;border-radius:4px;font-size:14px;margin-bottom:10px;background:#fff}
#lock-box input:focus{outline:none;border-color:#0D40D9}
#lock-box button{width:100%;height:40px;background:#14213D;color:#FFFFFF;border:none;border-radius:4px;font-size:14px;cursor:pointer;font-family:'Zen Kaku Gothic New',sans-serif}
#lock-error{color:#0D40D9;font-size:12px;margin-top:8px;min-height:18px}

#app{display:none}
.app-body{padding-left:64px}

.main{padding:40px 44px;max-width:920px}
.topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px}
.brand{font-family:'Shippori Mincho',serif;font-size:13px;letter-spacing:0.1em;color:#6B7A99}
.user{display:flex;align-items:center;gap:10px;font-size:12px;color:#14213D;cursor:pointer}
.user-avatar{width:28px;height:28px;border-radius:50%;overflow:hidden;border:1px solid #14213D;flex-shrink:0}
.user-avatar img{width:100%;height:100%;object-fit:cover;display:block}

h1{font-family:'Shippori Mincho',serif;font-size:27px;font-weight:700;margin-bottom:6px}
h1 span{color:#0D40D9}
.sub{font-size:13px;color:#6B7A99;margin-bottom:28px}

.status-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:32px}
.status-cell{background:#fff;border:1px solid #DEE7F7;border-radius:8px;padding:16px 18px}
.status-cell.link{text-decoration:none;color:inherit;display:block;transition:border-color 0.15s}
.status-cell.link:hover{border-color:#0D40D9}
.status-label{font-size:11px;color:#6B7A99;margin-bottom:8px;letter-spacing:0.03em}
.status-value{font-family:'Shippori Mincho',serif;font-size:21px;font-weight:700;color:#14213D}
.status-value.accent{color:#0D40D9}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.tile{background:#fff;border:1px solid #DEE7F7;border-radius:8px;padding:22px;text-decoration:none;color:inherit;transition:border-color 0.15s}
.tile:hover{border-color:#0D40D9}
.tile-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.tile-icon{width:32px;height:32px;border-radius:50%;overflow:hidden;border:1px solid #DEE7F7;flex-shrink:0}
.tile-icon img{width:100%;height:100%;object-fit:cover;display:block}
.tile-tag{font-family:'Shippori Mincho',serif;font-size:11px;color:#6B7A99;letter-spacing:0.05em}
.tile-title{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:700;margin-bottom:6px}
.tile-desc{font-size:12.5px;color:#6B7A99;line-height:1.6}

@media (max-width:700px){
  .app-body{padding-left:0;padding-top:56px}
  .main{padding:28px 20px}
  .status-strip{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
}
</style>
<link rel="stylesheet" href="assets/shared.css">
</head>
<body>

<div id="lock-screen">
  <div id="lock-box">
    <h2>AI torch 業務システム</h2>
    <p>メールアドレスとパスワードでログイン</p>
    <input type="email" id="email-input" placeholder="メールアドレス">
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">ログイン</button>
    <div id="lock-error"></div>
  </div>
</div>

<div id="app">
  <nav class="app-sidebar">
    <a class="sb-logo" href="index.html"><img src="assets/torch-blue-circle.jpg" alt="AI torch"></a>
    <a class="sb-item active" href="index.html"><span class="sb-icon">⌂</span><span class="sb-label">Home</span></a>
    <a class="sb-item" href="companies.html"><span class="sb-icon">◧</span><span class="sb-label">企業検索</span></a>
    <a class="sb-item" href="candidates.html"><span class="sb-icon">☰</span><span class="sb-label">候補者管理</span></a>
    <a class="sb-item" href="pipeline.html"><span class="sb-icon">◎</span><span class="sb-label">パイプライン</span></a>
    <a class="sb-item" href="https://k-aikawa-ai-torch.github.io/ai-torch-dashboard/dashboard.html"><span class="sb-icon">▤</span><span class="sb-label">ダッシュボード</span></a>
    <div class="sb-spacer"></div>
    <div class="sb-item" onclick="logout()"><span class="sb-icon">⏻</span><span class="sb-label">ログアウト</span></div>
  </nav>

    <div class="app-body main">
      <div class="topline">
        <div class="brand">AI TORCH — 業務システム</div>
        <div class="user" onclick="logout()"><span class="user-avatar"><img src="assets/ohagi-1.png" alt="おはぎ"></span><span id="user-label">読み込み中…</span></div>
      </div>

      <h1 id="greeting">収束を確認中……</h1>
      <div class="sub" id="datestr"></div>

      <div class="status-strip">
        <a class="status-cell link" href="companies.html">
          <div class="status-label">企業数</div>
          <div class="status-value" id="count-companies">—</div>
        </a>
        <a class="status-cell link" href="candidates.html">
          <div class="status-label">候補者数</div>
          <div class="status-value" id="count-candidates">—</div>
        </a>
        <a class="status-cell link" href="pipeline.html">
          <div class="status-label">パイプライン件数</div>
          <div class="status-value" id="count-pipeline">—</div>
        </a>
        <a class="status-cell link" href="https://k-aikawa-ai-torch.github.io/ai-torch-dashboard/dashboard.html">
          <div class="status-label">売上・KPI詳細</div>
          <div class="status-value accent">ダッシュボードへ →</div>
        </a>
      </div>

      <div class="grid">
        <a class="tile" href="companies.html">
          <div class="tile-top"><span class="tile-tag">01 — 企業</span><span class="tile-icon"><img src="assets/ohagi-1.png" alt=""></span></div>
          <div class="tile-title">企業検索</div>
          <div class="tile-desc">クライアント企業の情報検索・フィルタリング</div>
        </a>
        <a class="tile" href="candidates.html">
          <div class="tile-top"><span class="tile-tag">02 — 候補者</span><span class="tile-icon"><img src="assets/ohagi-2.png" alt=""></span></div>
          <div class="tile-title">候補者管理</div>
          <div class="tile-desc">候補者プロフィール・面談メモの管理</div>
        </a>
        <a class="tile" href="pipeline.html">
          <div class="tile-top"><span class="tile-tag">03 — 進捗</span><span class="tile-icon"><img src="assets/ohagi-3.png" alt=""></span></div>
          <div class="tile-title">パイプライン</div>
          <div class="tile-desc">選考進捗・ステータスの管理</div>
        </a>
        <a class="tile" href="https://k-aikawa-ai-torch.github.io/ai-torch-dashboard/dashboard.html">
          <div class="tile-top"><span class="tile-tag">04 — KPI</span><span class="tile-icon"><img src="assets/ohagi-4.png" alt=""></span></div>
          <div class="tile-title">ダッシュボード</div>
          <div class="tile-desc">KPI・売上見込みの集計</div>
        </a>
      </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://vqunibhzmvlckqbydgea.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdW5pYmh6bXZsY2txYnlkZ2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzY0NTYsImV4cCI6MjA5NzgxMjQ1Nn0.t9_RIVPY1vrgGmxxFFYXP9uWxT7401ha4Flc9q0_zMA';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let ALL_MEMBERS = [];

async function login() {
  const email = document.getElementById('email-input').value;
  const password = document.getElementById('pw-input').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('lock-error').textContent = 'メールアドレスまたはパスワードが違います';
    return;
  }
  showApp(data.session.user.email);
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

async function showApp(email) {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-label').textContent = email;

  const name = (email.split('@')[0] || '').toLowerCase();
  const baseLabel = name.includes('aikawa') ? '相川' : name.includes('nagai') ? '永井' : name.includes('aizawa') ? '會澤' : email;

  if (!ALL_MEMBERS.length) {
    const { data } = await sb.from('members').select('*');
    ALL_MEMBERS = data || [];
  }
  const me = ALL_MEMBERS.find(function(m) { return m.email === email; });
  let label = baseLabel;
  if (me && me.lab_number) {
    const nicknames = me.nickname ? me.nickname.split(',') : [];
    const picked = nicknames.length ? nicknames[Math.floor(Math.random() * nicknames.length)] : '';
    if (picked) label = picked;
  }

  const GREETINGS = [
    label => `ククク……この世界線に、<span>${label}</span>の帰還を確認した。`,
    label => `リーディング・シュタイナーが疼く。おかえりだ、<span>${label}</span>。`,
    label => `世界線変動率、収束を確認——ようこそ、<span>${label}</span>。`,
    label => `これが選択すべき世界線か……よく戻った、<span>${label}</span>。`,
    label => `エル・プサイ・コングルゥ。<span>${label}</span>、此度の任務、頼んだぞ。`,
    label => `アトラクタフィールドの収束を確認。<span>${label}</span>、ラボへようこそ。`,
    label => `カー・ブラックホールの向こう側から、<span>${label}</span>が帰還した。`,
    label => `運命石の扉が、また一つ開いた。おかえり、<span>${label}</span>。`,
    label => `ダイバージェンスに変化なし。<span>${label}</span>、いつも通りの世界線だ。`,
    label => `タイムリープ完了——記憶は正常に上書きされている、<span>${label}</span>。`,
    label => `機関の目を掻い潜り、<span>${label}</span>がこの世界線に舞い戻った。`,
    label => `世界線の収束範囲内、異常なし。おかえりなさい……は柄じゃないな、<span>${label}</span>。`,
    label => `選択の余地はなかった。この世界線こそが、<span>${label}</span>の帰る場所だ。`,
  ];
  const pick = GREETINGS[Math.floor(Math.random() * GREETINGS.length)];
  document.getElementById('greeting').innerHTML = pick(label);

  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('datestr').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${days[now.getDay()]}）`;

  loadCounts();
}

async function loadCounts() {
  const targets = [
    ['companies', 'count-companies'],
    ['candidates', 'count-candidates'],
    ['pipeline', 'count-pipeline'],
  ];
  for (const [table, elId] of targets) {
    try {
      const { count, error } = await sb.from(table).select('*', { count: 'exact', head: true });
      document.getElementById(elId).textContent = error ? '—' : count.toLocaleString();
    } catch (e) {
      document.getElementById(elId).textContent = '—';
    }
  }
}

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) {
    showApp(session.user.email);
  } else {
    document.getElementById('email-input').focus();
  }
});
</script>
</body>
</html>
