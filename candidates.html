<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI torch 候補者管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',-apple-system,BlinkMacSystemFont,sans-serif;background:#FFFFFF;color:#14213D;min-height:100vh}
#lock-screen{position:fixed;inset:0;background:#14213D;display:flex;align-items:center;justify-content:center;z-index:9999}
#lock-box{background:#FFFFFF;border-radius:4px;padding:36px 40px;width:320px;text-align:center}
#lock-box h2{font-size:16px;font-weight:500;margin-bottom:6px}
#lock-box p{font-size:13px;color:#6B7A99;margin-bottom:20px}
#lock-box input{width:100%;height:40px;padding:0 14px;border:1px solid #DEE7F7;border-radius:4px;font-size:15px;margin-bottom:10px;background:#fff}
#lock-box input:focus{outline:none;border-color:#0D40D9}
#lock-box button{width:100%;height:40px;background:#14213D;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer}
#lock-error{color:#0D40D9;font-size:12px;margin-top:8px;min-height:18px}
#app{display:none}
.nav{background:#fff;border-bottom:1px solid #DEE7F7;display:flex;gap:0}
.nav-btn{padding:10px 20px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#6B7A99;border-bottom:2px solid transparent}
.nav-btn.active{color:#14213D;border-bottom-color:#14213D;font-weight:500}
.main{max-width:1000px;margin:0 auto;padding:16px}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.filters-advanced{display:none;flex-wrap:wrap;gap:16px;margin-bottom:12px;padding:14px 16px;background:#fff;border:1px solid #DEE7F7;border-radius:8px}
.filters-advanced.show{display:flex}
.range-group{display:flex;align-items:center;gap:6px;font-size:12px;color:#6B7A99}
.range-group label{margin-right:2px;color:#14213D;font-weight:500;white-space:nowrap}
.range-group input{height:28px;padding:0 6px;border:1px solid #DEE7F7;border-radius:6px;font-size:12px;width:90px}
.range-group input[type=date]{width:132px}
.filter-reset{height:28px;padding:0 12px;border:1px solid #DEE7F7;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#6B7A99}
.job-type-picker{display:flex;flex-wrap:wrap;gap:6px}
.jt-tag{padding:5px 12px;border:1px solid #DEE7F7;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#555;white-space:nowrap;transition:all 0.15s;user-select:none}
.jt-tag.on{background:#14213D;color:#fff;border-color:#14213D}
.filters input{height:36px;padding:0 12px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;font-size:13px;min-width:200px}
.filters select{height:36px;padding:0 10px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;font-size:13px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.count{font-size:13px;color:#6B7A99}
.add-btn{padding:0 16px;height:36px;background:#14213D;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #DEE7F7;font-size:12px}
th{background:#f9f9f7;font-size:11px;font-weight:500;color:#6B7A99;padding:8px 12px;text-align:left;border-bottom:1px solid #DEE7F7;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #FFFFFF;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8;cursor:pointer}
.phase-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.ph1{background:#fef3cd;color:#7d5a00}
.ph2{background:#d4edda;color:#155724}
.ph3{background:#cce5ff;color:#004085}
.ph5{background:#e2d9f3;color:#3d2080}
.ph6{background:#d1ecf1;color:#0c5460}
.salary-cell{white-space:nowrap;color:#2d6a4f;font-weight:500}
.today-badge{background:#ffebcc;color:#b35a00;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px}
.overdue-badge{background:#feecec;color:#991a1a;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px}
#modal,#pipeline-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
#modal.open{display:flex}
#pipeline-modal{z-index:1100}
#pipeline-modal.open{display:flex}
#modal-box,#pipeline-modal-box{background:#fff;border-radius:12px;width:100%;max-width:700px;padding:24px;margin:auto}
#pipeline-modal-box{max-width:560px}
.modal-header{font-size:16px;font-weight:500;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#6B7A99}
.modal-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid #DEE7F7}
.modal-tab{padding:8px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#6B7A99;border-bottom:2px solid transparent}
.modal-tab.active{color:#14213D;border-bottom-color:#14213D;font-weight:500}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.detail-item{padding:6px 0;border-bottom:1px solid #FFFFFF}
.detail-label{font-size:10px;color:#aaa;margin-bottom:2px}
.detail-value{font-size:13px;color:#14213D}
.detail-full{grid-column:1/-1}
.markdown-preview{background:#f9f9f7;border:1px solid #DEE7F7;border-radius:8px;padding:12px;font-size:13px;color:#333;line-height:1.7;min-height:60px}
.markdown-preview h1,.markdown-preview h2,.markdown-preview h3{margin:8px 0 4px;font-weight:600}
.markdown-preview h1{font-size:16px}
.markdown-preview h2{font-size:14px}
.markdown-preview h3{font-size:13px}
.markdown-preview ul,.markdown-preview ol{padding-left:20px;margin:4px 0}
.markdown-preview li{margin:2px 0}
.markdown-preview p{margin:4px 0}
.pipeline-mini-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.pipeline-mini-table th{background:#f9f9f7;font-size:10px;font-weight:500;color:#6B7A99;padding:5px 8px;text-align:left;border-bottom:1px solid #DEE7F7}
.pipeline-mini-table td{padding:5px 8px;border-bottom:1px solid #FFFFFF;vertical-align:middle}
.pipeline-mini-table tr:last-child td{border-bottom:none}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:11px;color:#6B7A99;font-weight:500}
.form-group input,.form-group select,.form-group textarea{height:36px;padding:0 10px;border:1px solid #DEE7F7;border-radius:8px;font-size:13px;background:#fff;width:100%}
.form-group textarea{height:120px;padding:8px 10px;resize:vertical;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#0D40D9}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0;align-items:center}
.btn-save{padding:0 20px;height:38px;background:#14213D;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-cancel{padding:0 20px;height:38px;background:#fff;color:#14213D;border:1px solid #DEE7F7;border-radius:8px;font-size:13px;cursor:pointer}
.btn-delete{padding:0 20px;height:38px;background:#feecec;color:#991a1a;border:1px solid #f5c0c0;border-radius:8px;font-size:13px;cursor:pointer}
.btn-edit{padding:0 16px;height:32px;background:#FFFFFF;color:#14213D;border:1px solid #DEE7F7;border-radius:8px;font-size:12px;cursor:pointer}
.save-msg{font-size:12px;color:#2d6a4f;margin-right:auto}
.section-title{font-size:12px;font-weight:500;color:#6B7A99;margin:16px 0 8px;padding-top:12px;border-top:1px solid #f0f0f0}
.loading{text-align:center;padding:40px;color:#6B7A99;font-size:14px}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.mini-btn{padding:2px 8px;font-size:11px;border:1px solid #DEE7F7;border-radius:4px;background:#fff;cursor:pointer}
.add-job-btn{padding:4px 12px;font-size:12px;border:1px solid #14213D;border-radius:6px;background:#14213D;color:#fff;cursor:pointer}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f9f9f7;border:1px solid #DEE7F7;border-radius:6px;margin-bottom:4px}
.file-item a{font-size:12px;color:#14213D;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item a:hover{text-decoration:underline}
.file-item .file-ext{font-size:10px;color:#6B7A99;white-space:nowrap}
.file-del-btn{padding:1px 6px;font-size:11px;border:1px solid #f5c0c0;border-radius:4px;background:#feecec;color:#991a1a;cursor:pointer}
.upload-area{border:2px dashed #DEE7F7;border-radius:8px;padding:16px;text-align:center;margin-top:8px;transition:border-color 0.15s;cursor:pointer}
.upload-area:hover,.upload-area.over{border-color:#14213D;background:#f9f9f7}
.upload-area p{font-size:12px;color:#6B7A99;margin-bottom:6px}
.upload-msg{font-size:12px;color:#2d6a4f;margin-top:4px;min-height:16px}
.file-list{margin-top:8px}
.file-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:#f9f9f7;border:1px solid #DEE7F7;border-radius:6px;margin-bottom:4px}
.file-item a{font-size:12px;color:#14213D;text-decoration:none;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-item a:hover{text-decoration:underline}
.file-item .file-type{font-size:10px;color:#6B7A99;white-space:nowrap}
.file-delete-btn{padding:1px 6px;font-size:11px;border:1px solid #f5c0c0;border-radius:4px;background:#feecec;color:#991a1a;cursor:pointer;white-space:nowrap}
.file-upload-area{border:2px dashed #DEE7F7;border-radius:8px;padding:16px;text-align:center;cursor:pointer;margin-top:8px;transition:border-color 0.15s}
.file-upload-area:hover{border-color:#0D40D9}
.file-upload-area.dragover{border-color:#14213D;background:#f9f9f7}
.file-upload-area p{font-size:12px;color:#6B7A99;margin-bottom:6px}
.file-upload-btn{padding:4px 12px;font-size:12px;border:1px solid #DEE7F7;border-radius:6px;background:#fff;cursor:pointer}
.upload-progress{font-size:12px;color:#2d6a4f;margin-top:4px}
</style>
<link rel="stylesheet" href="assets/shared.css">
</head>
<body>
<div id="lock-screen">
  <div id="lock-box">
    <h2>AI torch 候補者管理</h2>
    <p>メールアドレスとパスワードでログイン</p>
    <input type="email" id="email-input" placeholder="メールアドレス">
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div id="lock-error"></div>
  </div>
</div>

<div id="app">
  <nav class="app-sidebar">
    <a class="sb-logo" href="index.html"><img src="assets/torch-blue-circle.jpg" alt="AI torch"></a>
    <a class="sb-item" href="index.html"><span class="sb-icon">⌂</span><span class="sb-label">Home</span></a>
    <a class="sb-item" href="companies.html"><span class="sb-icon">◧</span><span class="sb-label">企業検索</span></a>
    <a class="sb-item active" href="candidates.html"><span class="sb-icon">☰</span><span class="sb-label">候補者管理</span></a>
    <a class="sb-item" href="pipeline.html"><span class="sb-icon">◎</span><span class="sb-label">パイプライン</span></a>
    <a class="sb-item" href="https://k-aikawa-ai-torch.github.io/ai-torch-dashboard/dashboard.html"><span class="sb-icon">▤</span><span class="sb-label">ダッシュボード</span></a>
    <div class="sb-spacer"></div>
    <div class="sb-item" onclick="doLogout()"><span class="sb-icon">⏻</span><span class="sb-label">ログアウト</span></div>
  </nav>
  <div class="app-body">
    <div class="top-strip">
      <h1 class="brand-serif">AI torch 候補者管理</h1>
      <span class="badge" id="header-count">読み込み中…</span>
      <div class="member-tabs">
        <button class="member-tab active" onclick="setMember('全員',this)">全員</button>
        <button class="member-tab" onclick="setMember('相川',this)">相川</button>
        <button class="member-tab" onclick="setMember('永井',this)">永井</button>
        <button class="member-tab" onclick="setMember('會澤',this)">會澤</button>
      </div>
    </div>
  <div class="nav">
    <button class="nav-btn active" onclick="setTab('active',this)">進行中</button>
    <button class="nav-btn" onclick="setTab('future',this)">将来声かけ</button>
    <button class="nav-btn" onclick="setTab('done',this)">終了</button>
    <button class="nav-btn" onclick="setTab('all',this)">全て</button>
  </div>
  <div class="main">
    <div class="filters">
      <input type="text" id="q" placeholder="候補者名・経路・職種・現所属・電話番号・メールで検索…" oninput="render()">
      <select id="phase-filter" onchange="render()">
        <option value="">全フェーズ</option>
        <option>返信来た！</option><option>初回面談DONE</option><option>求人提案なう</option>
        <option>推薦するやでぃ</option><option>選考なう</option><option>内定KITAAA</option>
        <option>内定承諾歓喜</option><option>入社後フォローしようね</option>
      </select>
      <select id="source-filter" onchange="render()"><option value="">全経路</option></select>
      <select id="yomi-filter" onchange="render()">
        <option value="">全決定コミ</option>
        <option value="100%">100%</option><option value="80%">80%</option><option value="60%">60%</option>
        <option value="40%">40%</option><option value="20%">20%</option>
      </select>
      <select id="motivation-filter" onchange="render()">
        <option value="">全温度感</option>
        <option>高（すぐ動く）</option><option>中（いいところがあれば）</option><option>低（完全な情報収集）</option>
      </select>
      <select id="axis-filter" onchange="render()">
        <option value="">全転職軸</option>
        <option>年収アップ</option><option>裁量権</option><option>事業成長性</option>
        <option>ワークライフバランス</option><option>技術力・スキルアップ</option><option>安定性</option>
        <option>社風・人間関係</option><option>事業内容への共感</option><option>マネジメント経験</option>
      </select>
      <select id="job-filter" onchange="render()">
        <option value="">全職種</option>
        <option>CxO</option><option>SRE/クラウドエンジニア</option><option>開発エンジニア</option>
        <option>AI/DS</option><option>デザイナー</option><option>インフラエンジニア</option>
        <option>コンサル/PM</option><option>PdM</option><option>QA</option>
        <option>マーケター</option><option>WEBディレ</option><option>人事</option>
        <option>Bizdev</option><option>営業</option><option>その他</option>
      </select>
      <select id="attach-filter" onchange="render()">
        <option value="">添付 全て</option>
        <option value="yes">添付あり</option>
        <option value="no">添付なし</option>
      </select>
      <button type="button" id="adv-filter-toggle" onclick="toggleAdvFilters()" style="height:34px;padding:0 12px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#14213D">詳細フィルタ ▾</button>
    </div>
    <div class="filters-advanced" id="filters-advanced">
      <div class="range-group">
        <label>現年収(万)</label>
        <input type="number" id="cs-min" placeholder="下限" onchange="render()">〜
        <input type="number" id="cs-max" placeholder="上限" onchange="render()">
      </div>
      <div class="range-group">
        <label>希望年収(万)</label>
        <input type="number" id="ds-min" placeholder="下限" onchange="render()">〜
        <input type="number" id="ds-max" placeholder="上限" onchange="render()">
      </div>
      <div class="range-group">
        <label>入社想定日</label>
        <input type="date" id="ej-from" onchange="render()">〜
        <input type="date" id="ej-to" onchange="render()">
      </div>
      <div class="range-group">
        <label>登録日</label>
        <input type="date" id="reg-from" onchange="render()">〜
        <input type="date" id="reg-to" onchange="render()">
      </div>
      <div class="range-group">
        <label>NextAction日</label>
        <input type="date" id="na-from" onchange="render()">〜
        <input type="date" id="na-to" onchange="render()">
      </div>
      <button type="button" class="filter-reset" onclick="resetAdvFilters()">詳細フィルタをクリア</button>
    </div>
    <div class="top-bar">
      <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:#666;flex-wrap:wrap">
        <span class="count" id="count"></span>
        <label style="margin-left:12px">第1ソート:</label>
        <select id="sort1" onchange="render()" style="height:30px;font-size:12px;padding:0 8px;border:1px solid #DEE7F7;border-radius:6px;background:#fff">
          <option value="phase">フェーズ</option><option value="name">候補者名</option>
          <option value="next_action">NextAction日</option><option value="source">流入経路</option>
          <option value="job_type">職種</option><option value="desired_salary">希望年収</option>
          <option value="revenue_forecast">売上見込み</option><option value="registered_at">登録日</option>
          <option value="status">ステータス</option>
          <option value="current_company">現所属/概歴</option><option value="expected_join_date">入社想定日</option>
          <option value="phone">電話番号</option><option value="sns_url">SNS URL</option>
          <option value="email">メールアドレス</option><option value="decision_yomi">決定コミ</option><option value="motivation_level">温度感</option>
          <option value="current_salary">現年収</option><option value="top_priority_axis">転職軸</option>
        </select>
        <button id="sort1-dir-btn" onclick="toggleSortDir(1)" title="第1ソートの並び順を反転" style="height:30px;padding:0 10px;border:1px solid #DEE7F7;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#14213D">▲</button>
        <label>第2ソート:</label>
        <select id="sort2" onchange="render()" style="height:30px;font-size:12px;padding:0 8px;border:1px solid #DEE7F7;border-radius:6px;background:#fff">
          <option value="next_action">NextAction日</option><option value="phase">フェーズ</option>
          <option value="name">候補者名</option><option value="source">流入経路</option>
          <option value="job_type">職種</option><option value="desired_salary">希望年収</option>
          <option value="revenue_forecast">売上見込み</option><option value="registered_at">登録日</option>
          <option value="status">ステータス</option>
          <option value="current_company">現所属/概歴</option><option value="expected_join_date">入社想定日</option>
          <option value="phone">電話番号</option><option value="sns_url">SNS URL</option>
          <option value="email">メールアドレス</option><option value="decision_yomi">決定コミ</option><option value="motivation_level">温度感</option>
          <option value="current_salary">現年収</option><option value="top_priority_axis">転職軸</option>
        </select>
        <button id="sort2-dir-btn" onclick="toggleSortDir(2)" title="第2ソートの並び順を反転" style="height:30px;padding:0 10px;border:1px solid #DEE7F7;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#14213D">▲</button>
      </div>
      <button class="add-btn" onclick="openAdd()">＋ 候補者追加</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>候補者名</th><th>フェーズ</th><th>決定コミ</th><th>温度感</th><th>現年収</th><th>転職軸(優先1位)</th>
          <th>職種</th><th>現所属/概歴</th><th>希望年収</th><th>売上見込</th><th>入社想定日</th>
          <th>経路</th><th>登録日</th><th>NextAction日</th>
          <th>電話番号</th><th>SNS URL</th><th>メールアドレス</th><th>添付</th>
        </tr></thead>
        <tbody id="tbody"><tr><td colspan="18" class="loading">データを読み込み中…</td></tr></tbody>
      </table>
    </div>
  </div>
  </div>
</div>

<div id="modal">
  <div id="modal-box">
    <div class="modal-header">
      <span id="modal-title">候補者詳細</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" onclick="setModalTab('detail',this)">詳細</button>
      <button class="modal-tab" onclick="setModalTab('edit',this)">編集</button>

function getPhaseClass(phase) {

  if (['返信来た！','初回面談DONE'].includes(phase)) return 'ph1';
  if (['求人提案なう','推薦するやでぃ'].includes(phase)) return 'ph2';

  if (['内定KITAAA','内定承諾歓喜'].includes(phase)) return 'ph5';

function fmtDate(v) { return v ? v.substring(0,10) : '-'; }
function fmtSalary(v) { return v ? '¥'+(v/10000).toFixed(0)+'万' : '-'; }
function today() { return new Date().toISOString().substring(0,10); }

let sort1Dir = 1;
let sort2Dir = 1;
function cleanSource(s) {
  return (s || '').replace(/^[（(]+/, '').trim();
}
function toggleAdvFilters() {

function toggleSortDir(which) {

    sort1Dir *= -1;

  } else {
    sort2Dir *= -1;
    document.getElementById('sort2-dir-btn').textContent = sort2Dir === 1 ? '▲' : '▼';
  }
  render();
}

function compareCandBy(key, a, b) {
  if (key === 'phase') return PHASE_ORDER.indexOf(a.phase) - PHASE_ORDER.indexOf(b.phase);
  if (key === 'name') return (a.name||'').localeCompare(b.name||'','ja');
  if (key === 'next_action') {
    if (a.next_action_day && b.next_action_day) return a.next_action_day.localeCompare(b.next_action_day);
    if (a.next_action_day) return -1; if (b.next_action_day) return 1; return 0;
  }
  if (key === 'source') return (a.source||'').localeCompare(b.source||'','ja');
  if (key === 'job_type') return (a.job_type||'').localeCompare(b.job_type||'','ja');
  if (key === 'desired_salary') return (a.desired_salary||0)-(b.desired_salary||0);
  if (key === 'revenue_forecast') return (a.revenue_forecast||0)-(b.revenue_forecast||0);
  if (key === 'registered_at') return (a.registered_at||'').localeCompare(b.registered_at||'');
  if (key === 'status') return (a.status||'').localeCompare(b.status||'','ja');
  if (key === 'current_company') return (a.current_company||'').localeCompare(b.current_company||'','ja');
  if (key === 'expected_join_date') return (a.expected_join_date||'').localeCompare(b.expected_join_date||'');
  if (key === 'phone') return (a.phone||'').localeCompare(b.phone||'');
  if (key === 'sns_url') return (a.sns_url||'').localeCompare(b.sns_url||'');
  if (key === 'email') return (a.email||'').localeCompare(b.email||'');
  if (key === 'decision_yomi') return DECISION_YOMI_LIST.indexOf(a.decision_yomi||'') - DECISION_YOMI_LIST.indexOf(b.decision_yomi||'');
  if (key === 'motivation_level') return MOTIVATION_LIST.indexOf(a.motivation_level||'') - MOTIVATION_LIST.indexOf(b.motivation_level||'');
  if (key === 'current_salary') return (a.current_salary||0)-(b.current_salary||0);
  if (key === 'top_priority_axis') return AXIS_LIST.indexOf(a.top_priority_axis||'') - AXIS_LIST.indexOf(b.top_priority_axis||'');
  return 0;
}

function render() {
  const q = (document.getElementById('q').value||'').toLowerCase();
  const phaseFilter = document.getElementById('phase-filter').value;
  const sourceFilter = document.getElementById('source-filter').value;
  const yomiFilter = document.getElementById('yomi-filter').value;
  const motivationFilter = document.getElementById('motivation-filter').value;
  const axisFilter = document.getElementById('axis-filter').value;
  const jobFilter = document.getElementById('job-filter').value;
  const attachFilter = document.getElementById('attach-filter').value;
  const csMin = document.getElementById('cs-min').value ? parseInt(document.getElementById('cs-min').value) * 10000 : null;
  const csMax = document.getElementById('cs-max').value ? parseInt(document.getElementById('cs-max').value) * 10000 : null;
  const dsMin = document.getElementById('ds-min').value ? parseInt(document.getElementById('ds-min').value) * 10000 : null;
  const dsMax = document.getElementById('ds-max').value ? parseInt(document.getElementById('ds-max').value) * 10000 : null;
  const ejFrom = document.getElementById('ej-from').value;
  const ejTo = document.getElementById('ej-to').value;
  const regFrom = document.getElementById('reg-from').value;
  const regTo = document.getElementById('reg-to').value;
  const naFrom = document.getElementById('na-from').value;
  const naTo = document.getElementById('na-to').value;
  const todayStr = today();
  const sort1 = document.getElementById('sort1').value;
  const sort2 = document.getElementById('sort2').value;
  let res = DATA.filter(c => {
    if (currentTab === 'active' && c.status !== '進行中') return false;
    if (currentTab === 'future' && !c.status?.includes('将来的')) return false;
    if (currentTab === 'done' && !c.status?.includes('終了')) return false;
    if (currentMember !== '全員' && c.members?.name !== MEMBER_MAP[currentMember]) return false;
    if (q && !(c.name||'').toLowerCase().includes(q) && !(c.source||'').toLowerCase().includes(q) && !(c.job_type||'').toLowerCase().includes(q)
        && !(c.current_company||'').toLowerCase().includes(q) && !(c.phone||'').toLowerCase().includes(q) && !(c.email||'').toLowerCase().includes(q)) return false;
    if (phaseFilter && c.phase !== phaseFilter) return false;
    if (sourceFilter && c.source !== sourceFilter) return false;
    if (yomiFilter && c.decision_yomi !== yomiFilter) return false;
    if (motivationFilter && c.motivation_level !== motivationFilter) return false;
    if (axisFilter && c.top_priority_axis !== axisFilter) return false;
    if (jobFilter && !jobTypeArray(c).includes(jobFilter)) return false;
    if (attachFilter === 'yes' && !FILE_FLAGS.has(c.id)) return false;
    if (attachFilter === 'no' && FILE_FLAGS.has(c.id)) return false;
    if (csMin !== null && (c.current_salary||0) < csMin) return false;
    if (csMax !== null && (c.current_salary||0) > csMax) return false;
    if (dsMin !== null && (c.desired_salary||0) < dsMin) return false;
    if (dsMax !== null && (c.desired_salary||0) > dsMax) return false;
    if (ejFrom && (!c.expected_join_date || c.expected_join_date < ejFrom)) return false;
    if (ejTo && (!c.expected_join_date || c.expected_join_date > ejTo)) return false;
    if (regFrom && (!c.registered_at || c.registered_at < regFrom)) return false;
    if (regTo && (!c.registered_at || c.registered_at > regTo)) return false;
    if (naFrom && (!c.next_action_day || c.next_action_day < naFrom)) return false;
    if (naTo && (!c.next_action_day || c.next_action_day > naTo)) return false;
    return true;
  });
  res.sort((a,b) => { const r1=sort1Dir*compareCandBy(sort1,a,b); return r1!==0?r1:sort2Dir*compareCandBy(sort2,a,b); });
  document.getElementById('count').textContent = res.length + '名';
  if (!res.length) { document.getElementById('tbody').innerHTML = '<tr><td colspan="18" class="empty">該当する候補者がいません</td></tr>'; return; }
  document.getElementById('tbody').innerHTML = res.map(c => {
    const isToday = c.next_action_day === todayStr;
    const isOverdue = c.next_action_day && c.next_action_day < todayStr;
    const dateLabel = c.next_action_day
      ? fmtDate(c.next_action_day) + (isToday ? '<span class="today-badge">今日</span>' : '') + (isOverdue ? '<span class="overdue-badge">期限切れ</span>' : '')
      : '-';
    return '<tr onclick="openDetail(\'' + c.id + '\')">' +
      '<td><strong>' + (c.name||'-') + '</strong>' + (c.members ? '<br><span style="font-size:10px;color:#aaa">' + c.members.display_name + '</span>' : '') + '</td>' +
      '<td><span class="phase-badge ' + getPhaseClass(c.phase) + '">' + (c.phase||'-') + '</span></td>' +
      '<td style="color:#666">' + (c.decision_yomi||'-') + '</td>' +
      '<td style="color:#666">' + (c.motivation_level||'-') + '</td>' +
      '<td class="salary-cell">' + fmtSalary(c.current_salary) + '</td>' +
      '<td style="color:#666">' + (c.top_priority_axis||'-') + '</td>' +
      '<td style="color:#666">' + (c.job_type||'-') + '</td>' +
      '<td style="color:#666">' + (c.current_company||'-') + '</td>' +
      '<td class="salary-cell">' + fmtSalary(c.desired_salary) + '</td>' +
      '<td class="salary-cell">' + fmtSalary(c.revenue_forecast) + '</td>' +
      '<td style="color:#666">' + fmtDate(c.expected_join_date) + '</td>' +
      '<td style="color:#666">' + (cleanSource(c.source) || '-') + '</td>' +
      '<td style="color:#aaa">' + fmtDate(c.registered_at) + '</td>' +
      '<td>' + dateLabel + '</td>' +
      '<td style="color:#666">' + (c.phone||'-') + '</td>' +
      '<td style="color:#666">' + (c.sns_url ? '<a href="' + c.sns_url + '" target="_blank" onclick="event.stopPropagation()">リンク</a>' : '-') + '</td>' +
      '<td style="color:#666">' + (c.email ? '<a href="mailto:' + c.email + '" onclick="event.stopPropagation()">' + c.email + '</a>' : '-') + '</td>' +
      '<td style="text-align:center">' + (FILE_FLAGS.has(c.id) ? '📎' : '-') + '</td>' +
      '</tr>';
  }).join('');
}

function handleMemoKeydown(e) {
  var ta = e.target;
  var start = ta.selectionStart;
  var end = ta.selectionEnd;
  var val = ta.value;
  var lineStart = val.lastIndexOf('\n', start - 1) + 1;
  var currentLine = val.substring(lineStart, start);

  if (e.key === 'Enter') {
    var bulletMatch = currentLine.match(/^(\s*)([-*])\s/);
    if (bulletMatch) {
      if (currentLine.trim() === '-' || currentLine.trim() === '*') {
        e.preventDefault();
        ta.value = val.substring(0, lineStart) + '\n' + val.substring(end);
        ta.selectionStart = ta.selectionEnd = lineStart + 1;
        return;
      }
      e.preventDefault();
      var insert = '\n' + bulletMatch[1] + bulletMatch[2] + ' ';
      ta.value = val.substring(0, start) + insert + val.substring(end);
      ta.selectionStart = ta.selectionEnd = start + insert.length;
      return;
    }
    var numberedMatch = currentLine.match(/^(\s*)(\d+)\.\s/);
    if (numberedMatch) {
      if (currentLine.trim().match(/^\d+\.$/)) {
        e.preventDefault();
        ta.value = val.substring(0, lineStart) + '\n' + val.substring(end);
        ta.selectionStart = ta.selectionEnd = lineStart + 1;
        return;
      }
      e.preventDefault();
      var nextNum = parseInt(numberedMatch[2]) + 1;
      var insert2 = '\n' + numberedMatch[1] + nextNum + '. ';
      ta.value = val.substring(0, start) + insert2 + val.substring(end);
      ta.selectionStart = ta.selectionEnd = start + insert2.length;
      return;
    }
  }
  if (e.key === 'Tab') {
    e.preventDefault();
    ta.value = val.substring(0, start) + '  ' + val.substring(end);
    ta.selectionStart = ta.selectionEnd = start + 2;
  }
}

function toggleMemoMode(mode) {
  memoMode = mode;
  var ta = document.getElementById('f-memo');
  var preview = document.getElementById('memo-preview');
  var btnEdit = document.getElementById('btn-edit-mode');
  var btnPreview = document.getElementById('btn-preview-mode');
  if (mode === 'preview') {
    preview.innerHTML = marked.parse(ta.value || '');
    ta.style.display = 'none';
    preview.style.display = 'block';
    btnEdit.style.cssText = 'padding:2px 8px;font-size:11px;border:1px solid #DEE7F7;border-radius:4px;background:#fff;color:#14213D;cursor:pointer';
    btnPreview.style.cssText = 'padding:2px 8px;font-size:11px;border:1px solid #14213D;border-radius:4px;background:#14213D;color:#fff;cursor:pointer';
  } else {
    ta.style.display = 'block';
    preview.style.display = 'none';
    btnEdit.style.cssText = 'padding:2px 8px;font-size:11px;border:1px solid #14213D;border-radius:4px;background:#14213D;color:#fff;cursor:pointer';
    btnPreview.style.cssText = 'padding:2px 8px;font-size:11px;border:1px solid #DEE7F7;border-radius:4px;background:#fff;color:#14213D;cursor:pointer';
  }
}

function applyTemplate() {
  var sel = document.getElementById('template-select');
  var tid = sel.value;
  if (!tid) return;
  var t = TEMPLATES.find(function(t) { return t.id === tid; });
  if (!t) return;
  var ta = document.getElementById('f-memo');
  if (ta.value && !confirm('現在のメモを上書きしますか？')) { sel.value = ''; return; }
  ta.value = t.content;
  sel.value = '';
}

async function saveMemoTemplate() {
  var content = document.getElementById('f-memo').value;
  if (!content.trim()) { alert('メモに内容を入力してからテンプレートとして保存してください'); return; }
  var name = prompt('テンプレート名を入力してください（既存と同じ名前を入力すると上書きされます）:');
  if (!name) return;
  var existing = TEMPLATES.find(function(t) { return t.name === name; });
  if (existing) {
    if (!confirm('テンプレート「' + name + '」は既に存在します。上書きしますか？')) return;
    var { error } = await sb.from('templates').update({ content: content }).eq('id', existing.id);
    if (error) { alert('上書きに失敗しました: ' + error.message); return; }
    alert('テンプレート「' + name + '」を上書きしました');
  } else {
    var { error } = await sb.from('templates').insert({ name: name, content: content });
    if (error) { alert('保存に失敗しました: ' + error.message); return; }
    alert('テンプレート「' + name + '」を保存しました');
  }
  var { data } = await sb.from('templates').select('*').order('name');
  TEMPLATES = data || [];
  var sel = document.getElementById('template-select');
  if (sel) {
    sel.innerHTML = '<option value="">テンプレートを選択…</option>' + TEMPLATES.map(function(t) { return '<option value="' + t.id + '">' + t.name + '</option>'; }).join('');
  }
}

async function deleteMemoTemplate() {
  if (!TEMPLATES.length) { alert('削除できるテンプレートがありません'); return; }
  var list = TEMPLATES.map(function(t) { return t.name; }).join('\n');
  var name = prompt('削除するテンプレート名を入力してください（完全一致）。\n\n現在のテンプレート一覧:\n' + list);
  if (!name) return;
  var matches = TEMPLATES.filter(function(t) { return t.name === name; });
  if (!matches.length) { alert('その名前のテンプレートは見つかりませんでした'); return; }
  var msg = matches.length > 1
    ? '同名のテンプレートが' + matches.length + '件あります。すべて削除しますか？'
    : 'テンプレート「' + name + '」を削除します。よろしいですか？';
  if (!confirm(msg)) return;
  var ids = matches.map(function(t) { return t.id; });
  var { error } = await sb.from('templates').delete().in('id', ids);
  if (error) { alert('削除に失敗しました: ' + error.message); return; }
  alert('削除しました');
  var { data } = await sb.from('templates').select('*').order('name');
  TEMPLATES = data || [];
  var sel2 = document.getElementById('template-select');
  if (sel2) {
    sel2.innerHTML = '<option value="">テンプレートを選択…</option>' + TEMPLATES.map(function(t) { return '<option value="' + t.id + '">' + t.name + '</option>'; }).join('');
  }
}

async function savePipeline() {
  var jobName = document.getElementById('pf-job-name').value.trim();
  if (!jobName) { alert('求人名を入力してください'); return; }
  var payload = {
    job_name: jobName,
    job_url: document.getElementById('pf-job-url').value || null,
    phase: document.getElementById('pf-phase').value || null,
    status: document.getElementById('pf-status').value || null,
    next_action_day: document.getElementById('pf-next-action-day').value || null,
    recommended_at: document.getElementById('pf-recommended-at').value || null,
    memo: document.getElementById('pf-memo').value || null,
    updated_at: new Date().toISOString(),
  };
  var error;
  if (currentPipelineId) {
    var res = await sb.from('pipeline').update(payload).eq('id', currentPipelineId);
    error = res.error;
  } else {
    var candidate = DATA.find(function(c) { return c.id === currentPipelineCandidateId; });
    payload.candidate_id = currentPipelineCandidateId;
    payload.member_id = candidate ? candidate.member_id : null;
    var res2 = await sb.from('pipeline').insert(payload);
    error = res2.error;
  }
  if (error) { alert('保存に失敗しました: ' + error.message); return; }
  document.getElementById('pipeline-save-msg').textContent = '✅ 保存しました';
  setTimeout(async function() {
    closePipelineModal();
    if (currentId) {
      var { data: pipelines } = await sb.from('pipeline').select('*').eq('candidate_id', currentId).order('created_at', { ascending: false });
      var c = DATA.find(function(d) { return d.id === currentId; });
      renderDetail(c, pipelines || []);
    }
  }, 600);
}

async function deletePipeline(id) {

  if (error) { alert('削除に失敗しました: ' + error.message); return; }
  closePipelineModal();
  if (currentId) {
    var { data: pipelines } = await sb.from('pipeline').select('*').eq('candidate_id', currentId).order('created_at', { ascending: false });
    var c = DATA.find(function(d) { return d.id === currentId; });
    renderDetail(c, pipelines || []);
  }
}

  selBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    fileInput.click();
  });
  uploadDiv.addEventListener('click', function() { fileInput.click(); });
  uploadDiv.addEventListener('dragover', function(e) {
    e.preventDefault();
    uploadDiv.classList.add('over');
  });
  uploadDiv.addEventListener('dragleave', function() {
    uploadDiv.classList.remove('over');
  });
  uploadDiv.addEventListener('drop', function(e) {
    e.preventDefault();
    uploadDiv.classList.remove('over');
    doUpload(Array.from(e.dataTransfer.files), candidateId);
  });
  fileInput.addEventListener('change', function(e) {
    doUpload(Array.from(e.target.files), candidateId);
    e.target.value = '';
  });

  loadFileList(candidateId);
}

async function loadFileFlags() {
  try {
    const res = await sb.storage.from('candidates-files').list('', { limit: 1000 });
    const folders = (res.data || []).filter(f => f.id === null);
    FILE_FLAGS = new Set(folders.map(f => f.name));
    render();
  } catch (e) {
    // ファイル添付有無の表示だけなので、失敗しても致命的ではない
  }
}

async function loadFileList(candidateId) {
  var listDiv = document.getElementById('file-list');
  if (!listDiv) return;
  var res = await sb.storage.from('candidates-files').list(candidateId);
  var files = res.data || [];
  if (!files.length) {
    listDiv.innerHTML = '<span style="font-size:12px;color:#aaa">ファイルなし</span>';
    return;
  }
  var paths = files.map(function(f) { return candidateId + '/' + f.name; });
  var sRes = await sb.storage.from('candidates-files').createSignedUrls(paths, 3600);
  var signedUrls = sRes.data || [];
  listDiv.innerHTML = '';
  files.forEach(function(f, i) {
    var url = signedUrls[i] ? signedUrls[i].signedUrl : '#';
    var ext = f.name.split('.').pop().toUpperCase();
    var item = document.createElement('div');
    item.className = 'file-item';

    var extSpan = document.createElement('span');
    extSpan.className = 'file-ext';
    extSpan.textContent = ext;
    item.appendChild(extSpan);

    var link = document.createElement('a');
    link.href = url;
    link.target = '_blank';
    link.textContent = f.name;
    item.appendChild(link);

    var delBtn = document.createElement('button');
    delBtn.className = 'file-del-btn';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', function() { doDeleteFile(candidateId, f.name); });
    item.appendChild(delBtn);

    listDiv.appendChild(item);
  });
}

async function doUpload(files, candidateId) {
  var msgDiv = document.getElementById('upload-msg');
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (msgDiv) msgDiv.textContent = f.name + ' をアップロード中…';
    var res = await sb.storage.from('candidates-files').upload(candidateId + '/' + f.name, f, { upsert: true });
    if (res.error) {
      alert(f.name + ' のアップロードに失敗しました: ' + res.error.message);
    }
  }
  if (msgDiv) msgDiv.textContent = '✅ アップロード完了';
  setTimeout(function() { if (msgDiv) msgDiv.textContent = ''; }, 2000);
  loadFileList(candidateId);
}

async function doDeleteFile(candidateId, fileName) {
  if (!confirm(fileName + ' を削除してよいですか？')) return;
  var res = await sb.storage.from('candidates-files').remove([candidateId + '/' + fileName]);
  if (res.error) { alert('削除に失敗しました: ' + res.error.message); return; }
  loadFileList(candidateId);
}
</script>
