<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI torch 候補者管理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
#lock-screen{position:fixed;inset:0;background:#1a1a1a;display:flex;align-items:center;justify-content:center;z-index:9999}
#lock-box{background:#fff;border-radius:12px;padding:36px 40px;width:320px;text-align:center}
#lock-box h2{font-size:16px;font-weight:500;margin-bottom:6px}
#lock-box p{font-size:13px;color:#888;margin-bottom:20px}
#lock-box input{width:100%;height:40px;padding:0 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:10px}
#lock-box input:focus{outline:none;border-color:#888}
#lock-box button{width:100%;height:40px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
#lock-error{color:#c00;font-size:12px;margin-top:8px;min-height:18px}
#app{display:none}
.header{background:#1a1a1a;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header h1{font-size:15px;font-weight:500}
.badge{background:#3a3a3a;font-size:11px;padding:2px 8px;border-radius:4px;color:#aaa}
.member-tabs{display:flex;gap:4px;margin-left:auto}
.member-tab{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid #444;color:#aaa;background:transparent;transition:all 0.15s}
.member-tab.active{background:#fff;color:#1a1a1a;border-color:#fff}
.nav{background:#fff;border-bottom:1px solid #e8e8e8;display:flex;gap:0}
.nav-btn{padding:10px 20px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#888;border-bottom:2px solid transparent}
.nav-btn.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.main{max-width:1000px;margin:0 auto;padding:16px}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.filters input{height:36px;padding:0 12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px;min-width:200px}
.filters select{height:36px;padding:0 10px;border:1px solid #ddd;border-radius:8px;background:#fff;font-size:13px}
.count{font-size:13px;color:#888;margin-bottom:10px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e8e8e8;font-size:12px}
th{background:#f9f9f7;font-size:11px;font-weight:500;color:#888;padding:8px 12px;text-align:left;border-bottom:1px solid #e8e8e8;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #f5f5f0;vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8;cursor:pointer}
.phase-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.ph1{background:#fef3cd;color:#7d5a00}
.ph2{background:#d4edda;color:#155724}
.ph3{background:#cce5ff;color:#004085}
.ph5{background:#e2d9f3;color:#3d2080}
.ph6{background:#d1ecf1;color:#0c5460}
.status-badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;white-space:nowrap}
.st-active{background:#e1f5ee;color:#085041}
.st-future{background:#fff3cd;color:#7d5a00}
.st-done{background:#f1f1f1;color:#666}
.memo-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#666}
.salary-cell{white-space:nowrap;color:#2d6a4f;font-weight:500}
/* モーダル */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
#modal.open{display:flex}
#modal-box{background:#fff;border-radius:12px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px}
#modal-box h2{font-size:16px;font-weight:500;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#888}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.detail-item{padding:6px 0;border-bottom:1px solid #f5f5f0}
.detail-label{font-size:10px;color:#aaa;margin-bottom:2px}
.detail-value{font-size:13px;color:#1a1a1a}
.detail-full{grid-column:1/-1}
.next-action-box{background:#fffbf0;border:1px solid #f0e0a0;border-radius:8px;padding:12px;margin-top:12px}
.next-action-box .label{font-size:11px;color:#888;margin-bottom:4px}
.next-action-box .value{font-size:13px;color:#1a1a1a}
.loading{text-align:center;padding:40px;color:#888;font-size:14px}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.today-badge{background:#ffebcc;color:#b35a00;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px}
.overdue-badge{background:#feecec;color:#991a1a;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px}
</style>
</head>
<body>
<div id="lock-screen">
  <div id="lock-box">
    <h2>AI torch 候補者管理</h2>
    <p>メールアドレスとパスワードでログイン</p>
    <input type="email" id="email-input" placeholder="メールアドレス">
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">ログイン</button>
    <div id="lock-error"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <h1>AI torch 候補者管理</h1>
    <span class="badge" id="header-count">読み込み中…</span>
    <div class="member-tabs">
      <button class="member-tab active" onclick="setMember('全員',this)">全員</button>
      <button class="member-tab" onclick="setMember('相川',this)">相川</button>
      <button class="member-tab" onclick="setMember('永井',this)">永井</button>
      <button class="member-tab" onclick="setMember('會澤',this)">會澤</button>
    </div>
    <span class="badge" style="cursor:pointer" onclick="logout()">ログアウト</span>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="setTab('active',this)">進行中</button>
    <button class="nav-btn" onclick="setTab('future',this)">将来声かけ</button>
    <button class="nav-btn" onclick="setTab('done',this)">終了</button>
    <button class="nav-btn" onclick="setTab('all',this)">全て</button>
  </div>
  <div class="main">
    <div class="filters">
      <input type="text" id="q" placeholder="候補者名・経路・職種で検索…" oninput="render()">
      <select id="phase-filter" onchange="render()">
        <option value="">全フェーズ</option>
        <option>返信来た！</option>
        <option>初回面談DONE</option>
        <option>求人提案なう</option>
        <option>推薦するやでぃ</option>
        <option>選考なう</option>
        <option>内定KITAAA</option>
        <option>内定承諾歓喜</option>
        <option>入社後フォローしようね</option>
      </select>
      <select id="source-filter" onchange="render()">
        <option value="">全経路</option>
      </select>
    </div>
    <div class="top-bar" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <span class="count" id="count"></span>
      <div style="display:flex;align-items:center;gap:6px;font-size:13px;color:#666">
        <label>第1ソート:</label>
        <select id="sort1" onchange="render()" style="height:30px;font-size:12px;padding:0 8px;border:1px solid #ddd;border-radius:6px;background:#fff">
          <option value="phase">フェーズ</option>
          <option value="name">候補者名</option>
          <option value="next_action">NextAction日</option>
          <option value="source">流入経路</option>
          <option value="job_type">職種</option>
          <option value="desired_salary">希望年収</option>
          <option value="revenue_forecast">売上見込み</option>
          <option value="registered_at">登録日</option>
          <option value="status">ステータス</option>
        </select>
        <label>第2ソート:</label>
        <select id="sort2" onchange="render()" style="height:30px;font-size:12px;padding:0 8px;border:1px solid #ddd;border-radius:6px;background:#fff">
          <option value="next_action">NextAction日</option>
          <option value="phase">フェーズ</option>
          <option value="name">候補者名</option>
          <option value="source">流入経路</option>
          <option value="job_type">職種</option>
          <option value="desired_salary">希望年収</option>
          <option value="revenue_forecast">売上見込み</option>
          <option value="registered_at">登録日</option>
          <option value="status">ステータス</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>候補者名</th>
            <th>フェーズ</th>
            <th>ネクストアクション日</th>
            <th>経路</th>
            <th>職種</th>
            <th>希望年収</th>
            <th>売上見込</th>
            <th>登録日</th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="8" class="loading">データを読み込み中…</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div id="modal">
  <div id="modal-box">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="modal-name"></h2>
    <div class="detail-grid" id="modal-content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let DATA = [];
let MEMBERS = {};
let currentMember = '全員';
let currentTab = 'active';

const MEMBER_MAP = {
  '相川': 'aikawa_kenta',
  '永井': 'nagai_yudai',
  '會澤': 'aizawa_yuma'
};

async function login() {
  const email = document.getElementById('email-input').value;
  const password = document.getElementById('pw-input').value;
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('lock-error').textContent = 'メールアドレスまたはパスワードが違います';
    return;
  }
  showApp();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

function showApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) showApp();
});

async function loadData() {
  // メンバー取得
  const { data: members } = await sb.from('members').select('*');
  members.forEach(m => { MEMBERS[m.name] = m; });

  // 候補者取得
  const { data, error } = await sb.from('candidates')
    .select('*, members(display_name, name)')
    .order('registered_at', { ascending: false });

  if (error) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="loading">データの読み込みに失敗しました。</td></tr>';
    return;
  }

  DATA = data;
  document.getElementById('header-count').textContent = DATA.length + '名';

  // 経路フィルター初期化
  const sources = [...new Set(DATA.map(c => c.source).filter(Boolean))].sort();
  const sel = document.getElementById('source-filter');
  sources.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s;
    sel.appendChild(o);
  });

  render();
}

function setMember(m, el) {
  currentMember = m;
  document.querySelectorAll('.member-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setTab(t, el) {
  currentTab = t;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getPhaseClass(phase) {
  if (!phase) return 'ph1';
  if (['返信来た！','初回面談DONE'].includes(phase)) return 'ph1';
  if (['求人提案なう','推薦するやでぃ'].includes(phase)) return 'ph2';
  if (['選考なう'].includes(phase)) return 'ph3';
  if (['内定KITAAA','内定承諾歓喜'].includes(phase)) return 'ph5';
  if (['入社後フォローしようね'].includes(phase)) return 'ph6';
  return 'ph1';
}

function getStatusClass(status) {
  if (!status) return 'st-done';
  if (status === '進行中') return 'st-active';
  if (status.includes('将来的')) return 'st-future';
  return 'st-done';
}

function formatSalary(v) {
  if (!v) return '-';
  return '¥' + (v/10000).toFixed(0) + '万';
}

function formatDate(v) {
  if (!v) return '-';
  return v.substring(0, 10);
}

function today() { return new Date().toISOString().substring(0, 10); }

function render() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  const phaseFilter = document.getElementById('phase-filter').value;
  const sourceFilter = document.getElementById('source-filter').value;
  const todayStr = today();

  let res = DATA.filter(c => {
    // タブフィルター
    if (currentTab === 'active' && c.status !== '進行中') return false;
    if (currentTab === 'future' && !c.status?.includes('将来的')) return false;
    if (currentTab === 'done' && !c.status?.includes('終了')) return false;

    // 担当者フィルター
    if (currentMember !== '全員') {
      const memberName = MEMBER_MAP[currentMember];
      if (c.members?.name !== memberName) return false;
    }

    // 検索
    if (q && !(c.name||'').toLowerCase().includes(q) &&
        !(c.source||'').toLowerCase().includes(q) &&
        !(c.job_type||'').toLowerCase().includes(q)) return false;

    // フェーズ
    if (phaseFilter && c.phase !== phaseFilter) return false;

    // 経路
    if (sourceFilter && c.source !== sourceFilter) return false;

    return true;
  });

  const sort1 = document.getElementById('sort1').value;
  const sort2 = document.getElementById('sort2').value;

  const PHASE_ORDER_C = ['返信来た！','初回面談DONE','求人提案なう','推薦するやでぃ','選考なう','内定KITAAA','内定承諾歓喜','入社後フォローしようね'];

  function compareCandBy(key, a, b) {
    if (key === 'phase') return PHASE_ORDER_C.indexOf(a.phase) - PHASE_ORDER_C.indexOf(b.phase);
    if (key === 'name') return (a.name||'').localeCompare(b.name||'','ja');
    if (key === 'next_action') {
      if (a.next_action_day && b.next_action_day) return a.next_action_day.localeCompare(b.next_action_day);
      if (a.next_action_day) return -1;
      if (b.next_action_day) return 1;
      return 0;
    }
    if (key === 'source') return (a.source||'').localeCompare(b.source||'','ja');
    if (key === 'job_type') return (a.job_type||'').localeCompare(b.job_type||'','ja');
    if (key === 'desired_salary') return (b.desired_salary||0) - (a.desired_salary||0);
    if (key === 'revenue_forecast') return (b.revenue_forecast||0) - (a.revenue_forecast||0);
    if (key === 'registered_at') return (b.registered_at||'').localeCompare(a.registered_at||'');
    if (key === 'status') return (a.status||'').localeCompare(b.status||'','ja');
    return 0;
  }

  res.sort((a,b) => {
    const r1 = compareCandBy(sort1, a, b);
    if (r1 !== 0) return r1;
    return compareCandBy(sort2, a, b);
  });

  document.getElementById('count').textContent = res.length + '名';

  if (res.length === 0) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="8" class="empty">該当する候補者がいません</td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML = res.map(c => {
    const isToday = c.next_action_day === todayStr;
    const isOverdue = c.next_action_day && c.next_action_day < todayStr;
    const dateLabel = c.next_action_day
      ? `${formatDate(c.next_action_day)}${isToday ? '<span class="today-badge">今日</span>' : ''}${isOverdue ? '<span class="overdue-badge">期限切れ</span>' : ''}`
      : '-';

    return `<tr onclick="openModal('${c.id}')">
      <td><strong>${c.name||'-'}</strong>${c.members ? `<br><span style="font-size:10px;color:#aaa">${c.members.display_name}</span>` : ''}</td>
      <td><span class="phase-badge ${getPhaseClass(c.phase)}">${c.phase||'-'}</span></td>
      <td>${dateLabel}</td>
      <td style="color:#666">${c.source||'-'}</td>
      <td style="color:#666">${c.job_type||'-'}</td>
      <td class="salary-cell">${formatSalary(c.desired_salary)}</td>
      <td class="salary-cell">${formatSalary(c.revenue_forecast)}</td>
      <td style="color:#aaa">${formatDate(c.registered_at)}</td>
    </tr>`;
  }).join('');
}

function openModal(id) {
  const c = DATA.find(d => d.id === id);
  if (!c) return;

  document.getElementById('modal-name').textContent = c.name || '名前なし';

  const todayStr = today();
  const isToday = c.next_action_day === todayStr;
  const isOverdue = c.next_action_day && c.next_action_day < todayStr;

  document.getElementById('modal-content').innerHTML = `
    <div class="detail-item">
      <div class="detail-label">フェーズ</div>
      <div class="detail-value"><span class="phase-badge ${getPhaseClass(c.phase)}">${c.phase||'-'}</span></div>
    </div>
    <div class="detail-item">
      <div class="detail-label">ステータス</div>
      <div class="detail-value"><span class="status-badge ${getStatusClass(c.status)}">${c.status||'-'}</span></div>
    </div>
    <div class="detail-item">
      <div class="detail-label">担当者</div>
      <div class="detail-value">${c.members?.display_name||'-'}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">流入経路</div>
      <div class="detail-value">${c.source||'-'}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">職種</div>
      <div class="detail-value">${c.job_type||'-'}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">現所属/概歴</div>
      <div class="detail-value">${c.current_company||'-'}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">希望年収</div>
      <div class="detail-value">${formatSalary(c.desired_salary)}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">売上見込み</div>
      <div class="detail-value">${formatSalary(c.revenue_forecast)}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">売上ヨミ</div>
      <div class="detail-value">${formatSalary(c.revenue_yomi)}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">決定ヨミ</div>
      <div class="detail-value">${c.decision_yomi||'-'}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">登録日</div>
      <div class="detail-value">${formatDate(c.registered_at)}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">入社想定日</div>
      <div class="detail-value">${formatDate(c.expected_join_date)}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">メールアドレス</div>
      <div class="detail-value">${c.email ? `<a href="mailto:${c.email}">${c.email}</a>` : '-'}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">電話番号</div>
      <div class="detail-value">${c.phone||'-'}</div>
    </div>
    <div class="detail-item">
      <div class="detail-label">SNS URL</div>
      <div class="detail-value">${c.sns_url ? `<a href="${c.sns_url}" target="_blank">リンク</a>` : '-'}</div>
    </div>
    ${c.next_action ? `
    <div class="detail-item detail-full">
      <div class="next-action-box">
        <div class="label">ネクストアクション${c.next_action_day ? ` (${formatDate(c.next_action_day)}${isToday?' 今日':''}${isOverdue?' 期限切れ':''})` : ''}</div>
        <div class="value">${c.next_action}</div>
      </div>
    </div>` : ''}
  `;

  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
</body>
</html>
