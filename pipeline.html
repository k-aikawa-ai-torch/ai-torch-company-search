<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI torch パイプライン</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',-apple-system,BlinkMacSystemFont,sans-serif;background:#FFFFFF;color:#14213D;min-height:100vh}
#lock-screen{position:fixed;inset:0;background:#14213D;display:flex;align-items:center;justify-content:center;z-index:9999}
#lock-box{background:#FFFFFF;border-radius:4px;padding:36px 40px;width:320px;text-align:center}
#lock-box h2{font-size:16px;font-weight:500;margin-bottom:6px}
#lock-box p{font-size:13px;color:#6B7A99;margin-bottom:20px}
#lock-box input{width:100%;height:40px;padding:0 14px;border:1px solid #DEE7F7;border-radius:4px;font-size:15px;margin-bottom:10px;background:#fff}
#lock-box input:focus{outline:none;border-color:#0D40D9}
#lock-box button{width:100%;height:40px;background:#14213D;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer}
#lock-error{color:#0D40D9;font-size:12px;margin-top:8px;min-height:18px}
#app{display:none}
.main{max-width:1100px;margin:0 auto;padding:16px}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center}
.filters input{height:36px;padding:0 12px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;font-size:13px;min-width:200px}
.filters select{height:36px;padding:0 10px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;font-size:13px}
.filter-btn{padding:0 14px;height:36px;border-radius:8px;font-size:13px;cursor:pointer;transition:all 0.15s}
.filter-btn.on{background:#14213D;color:#fff;border:1px solid #14213D}
.filter-btn.off{background:#fff;color:#14213D;border:1px solid #DEE7F7}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.count{font-size:13px;color:#6B7A99}
.sort-wrap{display:flex;align-items:center;gap:6px;font-size:13px;color:#666}
.sort-wrap select{height:30px;font-size:12px;padding:0 8px;border:1px solid #DEE7F7;border-radius:6px;background:#fff}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #DEE7F7;font-size:12px}
th{background:#f9f9f7;font-size:11px;font-weight:500;color:#6B7A99;padding:8px 12px;text-align:left;border-bottom:1px solid #DEE7F7;white-space:nowrap}
td{padding:8px 12px;border-bottom:1px solid #FFFFFF;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8;cursor:pointer}
.phase-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap}
.ph-return{background:#fef3cd;color:#7d5a00}
.ph-propose{background:#d4edda;color:#155724}
.ph-selection{background:#cce5ff;color:#004085}
.ph-offer{background:#e2d9f3;color:#3d2080}
.ph-joined{background:#d1ecf1;color:#0c5460}
.ph-other{background:#f1f1f1;color:#666}
.memo-cell{max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#666}
.today-badge{background:#ffebcc;color:#b35a00;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px}
.overdue-badge{background:#feecec;color:#991a1a;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px}
.soon-badge{background:#e8f4fd;color:#0066cc;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px}
.funnel-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:16px}
.funnel-item{background:#fff;border:1px solid #DEE7F7;border-radius:10px;padding:10px 12px;text-align:center;cursor:pointer;transition:all 0.15s}
.funnel-item:hover{border-color:#0D40D9}
.funnel-item.active{border-color:#14213D;background:#14213D}
.funnel-item.active .funnel-num,.funnel-item.active .funnel-label{color:#fff}
.funnel-num{font-size:20px;font-weight:600;color:#14213D}
.funnel-label{font-size:10px;color:#6B7A99;margin-top:2px}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
#modal.open{display:flex}
#modal-box{background:#fff;border-radius:12px;width:90%;max-width:600px;max-height:85vh;overflow-y:auto;padding:24px}
#modal-box h2{font-size:16px;font-weight:500;margin-bottom:4px}
.modal-subtitle{font-size:13px;color:#6B7A99;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:#6B7A99}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
.detail-item{padding:6px 0;border-bottom:1px solid #FFFFFF}
.detail-label{font-size:10px;color:#aaa;margin-bottom:2px}
.detail-value{font-size:13px;color:#14213D}
.detail-full{grid-column:1/-1}
.memo-box{background:#f9f9f7;border:1px solid #DEE7F7;border-radius:8px;padding:12px;margin-top:4px;font-size:13px;color:#333;white-space:pre-wrap;line-height:1.6}
.loading{text-align:center;padding:40px;color:#6B7A99;font-size:14px}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
</style>
<link rel="stylesheet" href="assets/shared.css">
</head>
<body>
<div id="lock-screen">
  <div id="lock-box">
    <h2>AI torch パイプライン</h2>
    <p>メールアドレスとパスワードでログイン</p>
    <input type="email" id="email-input" placeholder="メールアドレス">
    <input type="password" id="pw-input" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">ログイン</button>
    <div id="lock-error"></div>
  </div>
</div>

<div id="app">
  <nav class="app-sidebar">
    <a class="sb-logo" href="index.html"><img src="assets/torch-blue-circle.jpg" alt="AI torch"></a>
    <a class="sb-item" href="index.html"><span class="sb-icon">⌂</span><span class="sb-label">Home</span></a>
    <a class="sb-item" href="companies.html"><span class="sb-icon">◧</span><span class="sb-label">企業検索</span></a>
    <a class="sb-item" href="candidates.html"><span class="sb-icon">☰</span><span class="sb-label">候補者管理</span></a>
    <a class="sb-item active" href="pipeline.html"><span class="sb-icon">◎</span><span class="sb-label">パイプライン</span></a>
    <a class="sb-item" href="https://k-aikawa-ai-torch.github.io/ai-torch-dashboard/dashboard.html"><span class="sb-icon">▤</span><span class="sb-label">ダッシュボード</span></a>
    <div class="sb-spacer"></div>
    <div class="sb-item" onclick="doLogout()"><span class="sb-icon">⏻</span><span class="sb-label">ログアウト</span></div>
  </nav>
  <div class="app-body">
    <div class="top-strip">
      <h1 class="brand-serif">AI torch パイプライン</h1>
      <span class="badge" id="header-count">読み込み中…</span>
      <div class="member-tabs">
        <button class="member-tab active" onclick="setMember('全員',this)">全員</button>
        <button class="member-tab" onclick="setMember('相川',this)">相川</button>
        <button class="member-tab" onclick="setMember('永井',this)">永井</button>
        <button class="member-tab" onclick="setMember('會澤',this)">會澤</button>
      </div>
    </div>
  <div class="main">
    <div class="funnel-row" id="funnel"></div>
    <div class="filters">
      <input type="text" id="q" placeholder="求人名・メモで検索…" oninput="render()">
      <select id="status-filter" onchange="render()">
        <option value="進行中">進行中</option>
        <option value="">全ステータス</option>
      </select>
      <button id="selection-btn" class="filter-btn on" onclick="toggleSelectionMode()">選考中のみ</button>
    </div>
    <div class="top-bar">
      <span class="count" id="count"></span>
      <div class="sort-wrap">
        <label>第1ソート:</label>
        <select id="sort1" onchange="render()">
          <option value="candidate">候補者名</option>
          <option value="next_action">NextAction日</option>
          <option value="phase">フェーズ</option>
          <option value="created">登録日</option>
          <option value="job">求人名</option>
        </select>
        <label style="margin-left:8px">第2ソート:</label>
        <select id="sort2" onchange="render()">
          <option value="phase">フェーズ</option>
          <option value="next_action">NextAction日</option>
          <option value="candidate">候補者名</option>
          <option value="created">登録日</option>
          <option value="job">求人名</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>担当</th>
            <th>候補者</th>
            <th>求人名</th>
            <th>フェーズ</th>
            <th>NextAction日</th>
            <th>メモ</th>
            <th>登録日</th>
          </tr>
        </thead>
        <tbody id="tbody"><tr><td colspan="7" class="loading">データを読み込み中…</td></tr></tbody>
      </table>
    </div>
  </div>
  </div>
</div>

<div id="modal">
  <div id="modal-box">
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 id="modal-title"></h2>
    <div class="modal-subtitle" id="modal-sub"></div>
    <div class="detail-grid" id="modal-content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vqunibhzmvlckqbydgea.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdW5pYmh6bXZsY2txYnlkZ2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzY0NTYsImV4cCI6MjA5NzgxMjQ1Nn0.t9_RIVPY1vrgGmxxFFYXP9uWxT7401ha4Flc9q0_zMA';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PHASE_ORDER = ['返信来た！','初回面談DONE','求人提案なう','推薦するやでぃ','応募承諾','書類選考','カジュアル面談','一次面接','二次～面接','最終面接','内定','内定承諾','入社待ち','入社済み'];
const SELECTION_PHASES = ['書類選考','カジュアル面談','一次面接','二次～面接','最終面接','内定','内定承諾'];
const MEMBER_MAP = {'相川':'aikawa_kenta','永井':'nagai_yudai','會澤':'aizawa_yuma'};

let DATA = [];
let currentMember = '全員';
let selectedPhase = '';
let selectionMode = true;

async function doLogin() {
  const email = document.getElementById('email-input').value;
  const password = document.getElementById('pw-input').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('lock-error').textContent = 'メールアドレスまたはパスワードが違います';
    return;
  }
  showApp();
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

function showApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}

sb.auth.getSession().then(({ data: { session } }) => {
  if (session) showApp();
});

async function loadData() {
  const { data, error } = await sb.from('pipeline')
    .select('*, members(display_name,name), candidates(name,source,desired_salary,revenue_forecast)')
    .order('created_at', { ascending: false });
  if (error) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="7" class="loading">読み込み失敗</td></tr>';
    return;
  }
  DATA = data;
  document.getElementById('header-count').textContent = DATA.length + '件';
  renderFunnel();
  render();
}

function setMember(m, el) {
  currentMember = m;
  document.querySelectorAll('.member-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedPhase = '';
  renderFunnel();
  render();
}

function toggleSelectionMode() {
  selectionMode = !selectionMode;
  const btn = document.getElementById('selection-btn');
  btn.className = 'filter-btn ' + (selectionMode ? 'on' : 'off');
  selectedPhase = '';
  renderFunnel();
  render();
}

function getFiltered() {
  const q = (document.getElementById('q').value || '').toLowerCase();
  const statusFilter = document.getElementById('status-filter').value;
  return DATA.filter(p => {
    if (currentMember !== '全員' && p.members?.name !== MEMBER_MAP[currentMember]) return false;
    if (statusFilter && p.status !== statusFilter) return false;
    if (selectionMode && !selectedPhase && !SELECTION_PHASES.includes(p.phase)) return false;
    if (selectedPhase && p.phase !== selectedPhase) return false;
    if (q && !(p.job_name||'').toLowerCase().includes(q) && !(p.memo||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function renderFunnel() {
  const statusFilter = document.getElementById('status-filter')?.value || '進行中';
  const base = DATA.filter(p => {
    if (currentMember !== '全員' && p.members?.name !== MEMBER_MAP[currentMember]) return false;
    if (statusFilter && p.status !== statusFilter) return false;
    if (selectionMode && !SELECTION_PHASES.includes(p.phase)) return false;
    return true;
  });
  const counts = {};
  base.forEach(p => { const ph = p.phase||'未設定'; counts[ph] = (counts[ph]||0)+1; });
  document.getElementById('funnel').innerHTML = PHASE_ORDER.filter(ph => counts[ph]).map(ph =>
    `<div class="funnel-item ${selectedPhase===ph?'active':''}" onclick="togglePhase('${ph}')">
      <div class="funnel-num">${counts[ph]}</div>
      <div class="funnel-label">${ph}</div>
    </div>`
  ).join('');
}

function togglePhase(ph) {
  selectedPhase = selectedPhase === ph ? '' : ph;
  renderFunnel();
  render();
}

function getPhaseClass(p) {
  if (!p) return 'ph-other';
  if (['返信来た！','初回面談DONE'].includes(p)) return 'ph-return';
  if (['求人提案なう','推薦するやでぃ','応募承諾'].includes(p)) return 'ph-propose';
  if (['書類選考','カジュアル面談','一次面接','二次～面接','最終面接'].includes(p)) return 'ph-selection';
  if (['内定'].includes(p)) return 'ph-offer';
  if (['内定承諾','入社待ち','入社済み'].includes(p)) return 'ph-joined';
  return 'ph-other';
}

function fmtDate(v) { return v ? v.substring(0,10) : '-'; }
function fmtSalary(v) { return v ? '¥'+(v/10000).toFixed(0)+'万' : '-'; }
function today() { return new Date().toISOString().substring(0,10); }
function dayDiff(d) {
  if (!d) return null;
  return Math.floor((new Date(d) - new Date(today())) / 86400000);
}

function dateLabel(d) {
  if (!d) return '-';
  const diff = dayDiff(d);
  let label = fmtDate(d);
  if (diff === 0) label += '<span class="today-badge">今日</span>';
  else if (diff < 0) label += '<span class="overdue-badge">期限切れ</span>';
  else if (diff <= 3) label += `<span class="soon-badge">あと${diff}日</span>`;
  return label;
}

function render() {
  let res = getFiltered();
  const sort1 = document.getElementById('sort1').value;
  const sort2 = document.getElementById('sort2').value;

  function compareBy(key, a, b) {
    if (key === 'next_action') {
      if (a.next_action_day && b.next_action_day) return a.next_action_day.localeCompare(b.next_action_day);
      if (a.next_action_day) return -1;
      if (b.next_action_day) return 1;
      return 0;
    }
    if (key === 'phase') return PHASE_ORDER.indexOf(a.phase) - PHASE_ORDER.indexOf(b.phase);
    if (key === 'created') return (b.created_at||'').localeCompare(a.created_at||'');
    if (key === 'job') return (a.job_name||'').localeCompare(b.job_name||'','ja');
    if (key === 'candidate') return (a.candidates?.name||'').localeCompare(b.candidates?.name||'','ja');
    return 0;
  }

  res.sort((a,b) => {
    const r1 = compareBy(sort1, a, b);
    if (r1 !== 0) return r1;
    return compareBy(sort2, a, b);
  });
  document.getElementById('count').textContent = res.length + '件';
  if (!res.length) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="7" class="empty">該当する案件がありません</td></tr>';
    return;
  }
  document.getElementById('tbody').innerHTML = res.map(p => {
    const job = (p.job_name||'').replace(/\n/g,' ').substring(0,25);
    const memo = (p.memo||'').replace(/\n/g,' ');
    return `<tr onclick="openModal('${p.id}')">
      <td style="color:#6B7A99;font-size:11px">${p.members?.display_name||'-'}</td>
      <td><strong>${p.candidates?.name||'-'}</strong></td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${job}</td>
      <td><span class="phase-badge ${getPhaseClass(p.phase)}">${p.phase||'-'}</span></td>
      <td style="white-space:nowrap">${dateLabel(p.next_action_day)}</td>
      <td class="memo-cell" title="${memo}">${memo||'-'}</td>
      <td style="color:#aaa">${fmtDate(p.created_at)}</td>
    </tr>`;
  }).join('');
}

function openModal(id) {
  const p = DATA.find(d => d.id === id);
  if (!p) return;
  document.getElementById('modal-title').textContent = (p.job_name||'').replace(/\n/g,' ');
  document.getElementById('modal-sub').textContent = (p.candidates?.name||'-') + ' ／ ' + (p.members?.display_name||'-');
  document.getElementById('modal-content').innerHTML = `
    <div class="detail-item"><div class="detail-label">フェーズ</div><div class="detail-value"><span class="phase-badge ${getPhaseClass(p.phase)}">${p.phase||'-'}</span></div></div>
    <div class="detail-item"><div class="detail-label">ステータス</div><div class="detail-value">${p.status||'-'}</div></div>
    <div class="detail-item"><div class="detail-label">NextAction日</div><div class="detail-value">${dateLabel(p.next_action_day)}</div></div>
    <div class="detail-item"><div class="detail-label">推薦日</div><div class="detail-value">${fmtDate(p.recommended_at)}</div></div>
    <div class="detail-item"><div class="detail-label">売上見込み</div><div class="detail-value">${fmtSalary(p.candidates?.revenue_forecast)}</div></div>
    <div class="detail-item"><div class="detail-label">希望年収</div><div class="detail-value">${fmtSalary(p.candidates?.desired_salary)}</div></div>
    <div class="detail-item"><div class="detail-label">流入経路</div><div class="detail-value">${p.candidates?.source||'-'}</div></div>
    <div class="detail-item"><div class="detail-label">登録日</div><div class="detail-value">${fmtDate(p.created_at)}</div></div>
    ${p.memo ? `<div class="detail-item detail-full"><div class="detail-label">メモ</div><div class="memo-box">${p.memo}</div></div>` : ''}
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
</script>
</body>
</html>
